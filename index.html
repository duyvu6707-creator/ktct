                            { q: "Trong nền kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam, việc phân phối kết quả làm ra (đầu ra) chủ yếu theo", a: ["kết quả lao động, hiệu quả kinh tế, mức độ đóng góp vốn cùng các nguồn lực khác và thông qua hệ thống an sinh xã hội, phúc lợi xã hội.", "nguồn lực đầu vào, cơ hội phát triển của các chủ thể và thông qua hệ thống an sinh xã hội, phúc lợi xã hội.", "hiệu quả kinh tế, tiếp cận và sử dụng các cơ hội và điều kiện phát triển của mọi chủ thể kinh tế.", "mức độ đóng góp vốn, các nguồn lực đầu vào cùng các nguồn lực khác và thông qua hệ thống an sinh xã hội, phúc lợi xã hội."], c: 0, r: "Cơ chế phân phối của Việt Nam là phân phối chủ yếu theo kết quả lao động, hiệu quả kinh tế, theo mức đóng góp vốn và thông qua phúc lợi, an sinh xã hội." },
                            { q: "Quan hệ phân phối bị chi phối và quyết định bởi", a: ["quan hệ giữa gắn tăng trưởng kinh tế với công bằng xã hội.", "quan hệ quản lí nền kinh tế.", "quan hệ sản xuất và trao đổi.", "quan hệ sở hữu về tư liệu sản xuất."], c: 3, r: "Theo lý luận của C. Mác, ai nắm quyền sở hữu tư liệu sản xuất thì người đó sẽ có quyền quyết định cách thức phân phối sản phẩm. Vì vậy quan hệ sở hữu quyết định quan hệ phân phối." },
                            { q: "Nền kinh tế thị trường định hướng xã hội chủ nghĩa thực hiện nhiều hình thức phân phối khác nhau, thực chất là", a: ["thực hiện các lợi ích kinh tế.", "điều chỉnh quan hệ sở hữu.", "thực hiện trách nhiệm kinh tế.", "thực hiện lợi ích xã hội."], c: 0, r: "Phân phối thực chất là việc chia sẻ các thành quả kinh tế cho các chủ thể tham gia, do đó thực hiện nhiều hình thức phân phối chính là thực hiện các lợi ích kinh tế." },
                            { q: "Nội dung nào dưới đây không phải là tác dụng của việc thực hiện nhiều hình thức phân phối ở nước ta?", a: ["Thúc đẩy tăng trưởng kinh tế và tiến bộ xã hội", "Góp phần cải thiện và nâng cao đời sống cho nhân dân", "Bảo đảm công bằng xã hội trong sử dụng các nguồn lực kinh tế", "Thực hiện lợi ích nhóm trong sử dụng các nguồn lực kinh tế"], c: 3, r: "Phân phối đa dạng nhằm tạo động lực công bằng và thúc đẩy phát triển chung, tuyệt đối không nhằm mục đích phục vụ cho 'lợi ích nhóm' tiêu cực." },
                            { q: "Những hình thức phân phối nào phản ánh định hướng xã hội chủ nghĩa của nền kinh tế thị trường ở Việt Nam?", a: ["Phân phối theo lao động và hiệu quả kinh tế, phân phối theo phúc lợi", "Phân phối theo mức độ đóng góp vốn và phân phối các yếu tố sản xuất", "Phân phối theo lao động, theo mức độ đóng góp vốn và phân phối theo phúc lợi", "Phân phối theo quy mô vốn và hiệu quả kinh tế, phân phối theo phúc lợi"], c: 0, r: "Phân phối theo lao động và phúc lợi xã hội là hai hình thức phân phối thể hiện rõ nhất tính chất ưu việt, nhân văn, hướng tới sự công bằng của chế độ XHCN." },
                            { q: "Đặc trưng nào phản ánh thuộc tính quan trọng mang tính định hướng xã hội chủ nghĩa của nền kinh tế thị trường ở Việt Nam?", a: ["Về mục tiêu", "Về quan hệ giữa gắn tăng trưởng kinh tế với công bằng xã hội", "Về quan hệ phân phối", "Về quan hệ quản lí nền kinh tế"], c: 1, r: "Gắn kết chặt chẽ giữa tăng trưởng kinh tế với thực hiện tiến bộ và công bằng xã hội ngay trong từng bước đi, từng chính sách là thuộc tính bản chất định hướng XHCN ở nước ta." },
                            { q: "Những quy tắc, luật pháp, bộ máy quản lí và cơ chế vận hành nhằm điều chỉnh các hành vi của con người trong một chế độ xã hội là nội dung thể hiện khái niệm nào?", a: ["Thể chế", "Quy luật", "Nguyên tắc", "Quản lí"], c: 0, r: "Đây là định nghĩa tổng quát của 'thể chế', bao gồm hệ thống các quy định, luật lệ, thiết chế bộ máy và cơ chế vận hành để điều chỉnh các quan hệ xã hội." },
                            { q: "Hệ thống quy tắc, luật pháp, bộ máy quản lí và cơ chế vận hành nhằm điều chỉnh hành vi của các chủ thể kinh tế, các hành vi sản xuất kinh doanh và các quan hệ kinh tế là nội dung thể hiện khái niệm nào?", a: ["Cơ cấu kinh tế", "Cơ cấu giai cấp", "Thể chế kinh tế", "Thể chế chính trị"], c: 2, r: "Thể chế áp dụng riêng trong lĩnh vực kinh tế, điều chỉnh các hành vi sản xuất, kinh doanh và quan hệ kinh tế thì được gọi là Thể chế kinh tế." },
                            { q: "Yếu tố nào dưới đây không phải là bộ phận cơ bản của thể chế kinh tế?", a: ["Hệ thống pháp luật về kinh tế của nhà nước", "Các quy tắc xã hội không được nhà nước thừa nhận", "Hệ thống các chủ thể thực hiện các hoạt động kinh tế", "Các cơ chế, phương pháp thực hiện, vận hành nền kinh tế"], c: 1, r: "Thể chế kinh tế bắt buộc phải được Nhà nước thừa nhận và hợp thức hóa bằng pháp luật. Các quy tắc ngầm không được thừa nhận không thuộc về thể chế kinh tế chính thức." },
                            { q: "Hệ thống đường lối, chủ trương chiến lược, hệ thống luật pháp, chính sách quy định xác lập cơ chế vận hành, điều chỉnh chức năng, hoạt động, mục tiêu, phương thức hoạt động, các quan hệ lợi ích của các tổ chức, các chủ thể kinh tế nhằm hướng tới xác lập đồng bộ các yếu tố thị trường, các loại thị trường hiện đại theo hướng góp phần thúc đẩy dân giàu, nước mạnh, dân chủ, công bằng, văn minh là nội dung thể hiện khái niệm nào dưới đây?", a: ["Thể chế kinh tế thị trường định hướng xã hội chủ nghĩa", "Thể chế sở hữu của nền kinh tế thị trường", "Thể chế chính trị của kinh tế thị trường định hướng xã hội chủ nghĩa", "Thể chế kinh tế thị trường tư bản chủ nghĩa"], c: 0, r: "Đây là khái niệm đầy đủ nhất về Thể chế kinh tế thị trường định hướng XHCN, bao trùm cả cơ chế thị trường và mục tiêu dân giàu, nước mạnh." },
                            { q: "Việc hoàn thiện thể chế kinh tế thị trường định hướng xã hội chủ nghĩa xuất phát từ lí do nào?", a: ["Hệ thống thể chế hiệu quả, đồng bộ các yếu tố thị trường và các loại thị trường", "Hệ thống đã đầy đủ các yếu tố thị trường, các loại thị trường nên cần phải hoàn thiện", "Thể chế kinh tế thị trường đã đồng bộ, hệ thống thể chế đầy đủ nhưng còn kém hiệu lực", "Thể chế còn chưa đồng bộ, hệ thống thể chế chưa đầy đủ, kém hiệu lực"], c: 3, r: "Nền kinh tế nước ta đang trong quá trình chuyển đổi, do đó hệ thống thể chế thị trường vẫn còn nhiều điểm chưa đồng bộ, chưa đầy đủ và hiệu lực thực thi kém, đòi hỏi phải tiếp tục hoàn thiện." },
                            { q: "Nội dung nào dưới đây không liên quan đến việc hoàn thiện thể chế về sở hữu trong nền kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam?", a: ["Thể chế hoá đầy đủ quyền tài sản của Nhà nước, tổ chức và cá nhân", "Hoàn thiện pháp luật về quản lí, khai thác và sử dụng tài nguyên thiên nhiên", "Hoàn thiện pháp luật về đầu tư vốn nhà nước, quản lí và sử dụng có hiệu quả tài sản công", "Hoàn thiện thể chế để phát triển đồng bộ, vận hành thông suốt các loại thị trường"], c: 3, r: "Phát triển đồng bộ các loại thị trường (thị trường vốn, lao động, đất đai...) thuộc về nhóm giải pháp hoàn thiện 'các yếu tố thị trường', không nằm trong nhóm 'thể chế về sở hữu'." },
                            { q: "Việc thể chế hoá đầy đủ quyền tài sản của Nhà nước, tổ chức và cá nhân bao gồm các quyền cơ bản nào dưới đây?", a: ["Quyền sở hữu, quyền tự do, quyền chiếm đoạt và hưởng lợi từ tài sản", "Quyền sở hữu, quyền sử dụng, quyền định đoạt và hưởng lợi từ tài sản", "Quyền chuyển nhượng, quyền sở hữu, quyền định đoạt và hưởng lợi từ tài sản", "Quyền tự do, quyền sáng tạo, quyền tự quyết và hưởng lợi từ tài sản"], c: 1, r: "Theo luật định, quyền tài sản cốt lõi bao gồm quyền chiếm hữu (sở hữu), quyền sử dụng, quyền định đoạt số phận tài sản và quyền hưởng hoa lợi, lợi tức từ tài sản đó." },
                            { q: "Nội dung nào dưới đây là sai khi nói về việc hoàn thiện thể chế phát triển các thành phần kinh tế, các loại hình doanh nghiệp?", a: ["Thực hiện nhất quán một chế độ pháp lí kinh doanh cho các doanh nghiệp, không phân biệt hình thức sở hữu và thành phần kinh tế", "Mọi doanh nghiệp thuộc các thành phần kinh tế đều bình đẳng và cạnh tranh lành mạnh theo pháp luật", "Thực hiện nhất quán một chế độ pháp lí kinh doanh cho các doanh nghiệp, có sự phân biệt hình thức sở hữu và thành phần kinh tế", "Mọi doanh nghiệp thuộc các thành phần kinh tế đều hoạt động theo cơ chế thị trường"], c: 2, r: "Luật pháp kinh tế hiện nay đòi hỏi phải bình đẳng, 'không phân biệt' hình thức sở hữu. Do đó nhận định 'có sự phân biệt' là hoàn toàn sai với chủ trương." },
                            { q: "Việc hoàn thiện thể chế kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam không bao gồm nội dung nào dưới đây?", a: ["Hoàn thiện thể chế về sở hữu, phát triển các thành phần kinh tế, các loại hình doanh nghiệp", "Hoàn thiện thể chế để hạn chế sự đồng bộ các yếu tố thị trường và các loại thị trường", "Hoàn thiện thể chế gắn tăng trưởng kinh tế với đảm bảo phát triển bền vững, tiến bộ và công bằng xã hội và thúc đẩy hội nhập quốc tế", "Hoàn thiện thể chế, đẩy mạnh, nâng cao năng lực lãnh đạo của Đảng và hệ thống chính trị"], c: 1, r: "Mục tiêu của chúng ta là phải 'phát triển đồng bộ' các yếu tố thị trường, chứ không phải 'hạn chế sự đồng bộ'. Nhận định B đi ngược lại với đường lối." },
                            { q: "Việc hoàn thiện thể chế thu hút vốn đầu tư trực tiếp nước ngoài ở nước ta không được thực hiện theo hướng", a: ["chủ động lựa chọn các dự án đầu tư nước ngoài có chuyển giao công nghệ tiên tiến và quản trị hiện đại.", "chủ động lựa chọn các dự án đầu tư nước ngoài có cơ sở nghiên cứu và phát triển công nghệ tại Việt Nam.", "chủ động lựa chọn các dự án đầu tư nước ngoài tập trung vào các ngành công nghiệp nặng, khai thác tài nguyên thiên nhiên.", "chủ động lựa chọn các dự án đầu tư nước ngoài có cam kết liên kết, hỗ trợ doanh nghiệp trong nước tham gia chuỗi giá trị toàn cầu."], c: 2, r: "Chiến lược hiện nay là hạn chế và từ chối các dự án khai thác tài nguyên thô, tiêu tốn năng lượng, ô nhiễm môi trường (công nghiệp nặng cũ). Thay vào đó tập trung hút công nghệ cao, xanh, sạch." },
                            { q: "Sự thoả mãn nhu cầu của con người mà sự thoả mãn nhu cầu này phải được nhận thức và đặt trong mối quan hệ xã hội ứng với trình độ phát triển nhất định của nền sản xuất xã hội đó là nội dung thể hiện khái niệm nào?", a: ["Lợi ích", "Giá trị sử dụng", "Nhu cầu", "Hưởng thụ"], c: 0, r: "Lợi ích không chỉ là sự thỏa mãn nhu cầu sinh học đơn thuần, mà nó phải được nhận thức và biểu hiện qua các quan hệ xã hội, gắn với trình độ kinh tế - xã hội nhất định." },
                            { q: "Lợi ích vật chất đóng vai trò gì đối với hoạt động của mỗi cá nhân, tổ chức và xã hội?", a: ["Phụ thuộc", "Quyết định", "Độc lập", "Bổ trợ"], c: 1, r: "Theo triết học Mác, vật chất quyết định ý thức. Do đó, lợi ích vật chất là động lực sâu xa, đóng vai trò quyết định chi phối mọi hoạt động của con người và xã hội." },
                            { q: "Về bản chất, lợi ích phản ánh mục đích và động cơ của các quan hệ kinh tế giữa các chủ thể trong nền sản xuất xã hội là", a: ["lợi ích xã hội.", "lợi ích tinh thần.", "lợi ích công cộng.", "lợi ích kinh tế."], c: 3, r: "Lợi ích kinh tế phản ánh mục đích và động cơ thiết thực nhất của các chủ thể khi quyết định tham gia vào các quan hệ kinh tế trong nền sản xuất xã hội." },
                            { q: "Biểu hiện lợi ích kinh tế của người lao động trước hết là yếu tố nào dưới đây?", a: ["Thu nhập", "Lợi nhuận", "Chất lượng", "Trách nhiệm"], c: 0, r: "Đối với người lao động làm thuê, mục tiêu sống còn và biểu hiện trực tiếp nhất cho lợi ích kinh tế của họ chính là tiền lương, tiền công (gọi chung là thu nhập)." },
                            { q: "Biểu hiện lợi ích kinh tế của chủ doanh nghiệp trước hết là yếu tố nào dưới đây?", a: ["Tiền công", "Lợi nhuận", "Thu nhập", "Trách nhiệm"], c: 1, r: "Mục đích cao nhất của nhà tư bản, chủ doanh nghiệp khi đầu tư vốn vào sản xuất kinh doanh là nhằm thu về lượng lợi nhuận tối đa." },
                            { q: "Khẳng định nào dưới đây là sai khi nói về biểu hiện của lợi ích kinh tế?", a: ["Gắn với các chủ thể kinh tế khác nhau là những lợi ích giống nhau", "Về lâu dài, đã tham gia vào hoạt động kinh tế thì lợi ích kinh tế là lợi ích quyết định", "Trong nền kinh tế thị trường, ở đâu có hoạt động sản xuất kinh doanh, lao động, ở đó có quan hệ lợi ích và lợi ích kinh tế", "Gắn với các chủ thể kinh tế khác nhau là những lợi ích tương ứng"], c: 0, r: "Mỗi chủ thể có địa vị khác nhau (ví dụ: người làm thuê cần tiền công, ông chủ cần lợi nhuận), do đó lợi ích kinh tế của họ luôn khác nhau và đối lập nhau. Việc nói lợi ích 'giống nhau' là sai." },
                            { q: "Điểm chung của tất cả các hoạt động kinh tế trong nền kinh tế thị trường là hướng tới", a: ["lợi ích.", "tự chủ.", "trách nhiệm.", "cạnh tranh."], c: 0, r: "Lợi ích (đặc biệt là lợi ích vật chất) là điểm chung, là nam châm và là động lực cốt lõi thúc đẩy mọi hành vi của các chủ thể kinh tế." },
                            { q: "Khẳng định nào dưới đây là đúng khi nói về vai trò của lợi ích kinh tế đối với các chủ thể kinh tế – xã hội?", a: ["Lợi ích kinh tế là động lực gián tiếp của các chủ thể và hoạt động kinh tế – xã hội; là cơ sở thúc đẩy sự phát triển các lợi ích khác", "Lợi ích kinh tế mang tính chủ quan và phụ thuộc vào sự phát triển của các lợi ích khác", "Lợi ích kinh tế là động lực gián tiếp của các chủ thể và hoạt động kinh tế – xã hội; là động lực mạnh mẽ để phát triển kinh tế – xã hội", "Lợi ích kinh tế là động lực trực tiếp của các chủ thể và hoạt động kinh tế – xã hội; là cơ sở thúc đẩy sự phát triển các lợi ích khác"], c: 3, r: "Lợi ích kinh tế đáp ứng nhu cầu sinh tồn thiết yếu nên nó là động lực trực tiếp. Nó cung cấp cơ sở vật chất để từ đó làm nền tảng thúc đẩy sự phát triển của lợi ích chính trị, văn hóa, xã hội." },
                            { q: "Các loại thị trường cơ bản như thị trường hàng hoá, dịch vụ; thị trường vốn; thị trường công nghệ; thị trường hàng hoá sức lao động... cần phải được hoàn thiện là nội dung của việc hoàn thiện thể chế nào dưới đây?", a: ["Thể chế để phát triển đồng bộ, vận hành thông suốt các loại thị trường", "Thể chế phát triển đồng bộ các yếu tố thị trường", "Thể chế gắn kết tăng trưởng kinh tế với bảo đảm phát triển bền vững", "Thể chế phát triển các thành phần kinh tế, các loại hình doanh nghiệp"], c: 0, r: "Thị trường hàng hóa, dịch vụ, vốn, công nghệ, sức lao động... được gọi chung là 'các loại thị trường'. Việc hoàn thiện chúng nằm trong nhóm giải pháp phát triển đồng bộ các loại thị trường." },
                            { q: "Hình thức lợi ích nào là cơ sở thúc đẩy sự phát triển của các lợi ích khác?", a: ["Lợi ích xã hội", "Lợi ích công cộng", "Lợi ích tập thể", "Lợi ích kinh tế"], c: 3, r: "Theo triết học Mác (vật chất quyết định ý thức, kinh tế quyết định chính trị), lợi ích kinh tế (vật chất) luôn là cái gốc, là cơ sở để thúc đẩy các lợi ích tinh thần và xã hội khác." },
                            { q: "Điền từ ngữ thích hợp vào chỗ chấm: Việc theo đuổi những lợi ích kinh tế không chính đáng, không hợp lí, không hợp pháp sẽ ......", a: ["đóng góp vào sự phát triển của nền kinh tế – xã hội.", "gây trở ngại cho sự phát triển kinh tế – xã hội.", "đem lại lợi ích kinh tế hợp pháp cho các chủ thể.", "tạo ra động lực cho sự phát triển của các doanh nghiệp."], c: 1, r: "Những lợi ích bất chính (buôn lậu, làm hàng giả, trốn thuế...) sẽ phá vỡ quy luật cạnh tranh lành mạnh, làm xói mòn đạo đức và gây trở ngại lớn cho sự phát triển chung của toàn xã hội." },
                            { q: "Quan điểm của Đảng và Nhà nước ta về lợi ích kinh tế là: Coi lợi ích kinh tế là", a: ["động lực của các hoạt động kinh tế; phải tôn trọng lợi ích cá nhân chính đáng.", "yếu tố không quyết định hoạt động kinh tế; phải tôn trọng lợi ích cá nhân chính đáng.", "trở ngại của các hoạt động kinh tế; phải nhấn mạnh lợi ích tập thể chính đáng.", "nhân tố phụ thuộc hoạt động kinh tế; phải đảm bảo lợi ích doanh nghiệp chính đáng."], c: 0, r: "Đảng và Nhà nước ta xác định lợi ích kinh tế là động lực trực tiếp, đồng thời chủ trương bảo vệ, tôn trọng lợi ích cá nhân chính đáng, hợp pháp để kích thích sự sáng tạo của người lao động." },
                            { q: "Sự thiết lập những tương tác giữa con người với con người, giữa các cộng đồng người, giữa các tổ chức kinh tế... nhằm mục tiêu xác lập các lợi ích kinh tế trong mối liên hệ với trình độ phát triển của lực lượng sản xuất và kiến trúc thượng tầng... là nội dung của khái niệm nào?", a: ["Lợi ích kinh tế", "Quan hệ lợi ích kinh tế", "Lợi ích vật chất", "Quan hệ lợi ích tập thể"], c: 1, r: "Sự tương tác qua lại, thiết lập các mối liên hệ nhằm phân chia và xác lập lợi ích giữa các bên chính là bản chất của khái niệm 'quan hệ lợi ích kinh tế'." },
                            { q: "Quan hệ nào dưới đây không phải là biểu hiện của quan hệ lợi ích kinh tế?", a: ["Quan hệ giữa một tổ chức kinh tế với một cá nhân trong tổ chức kinh tế đó", "Quan hệ giữa các chủ thể, các bộ phận khác nhau hợp thành nền kinh tế", "Quan hệ giữa một tổ chức kinh tế với một cá nhân ngoài tổ chức kinh tế đó", "Quan hệ giữa một quốc gia với các quốc gia khác trên thế giới"], c: 2, r: "Theo lý luận phân chia hệ thống biểu hiện của quan hệ lợi ích kinh tế, người ta phân ra quan hệ nội bộ, quan hệ giữa các bộ phận kinh tế và quan hệ quốc tế. (Dựa theo đáp án chuẩn của sách là phương án C)." },
                            { q: "Quan hệ lợi ích kinh tế thống nhất với nhau vì", a: ["một chủ thể có thể trở thành bộ phận cấu thành của chủ thể khác, do đó lợi ích của chủ thể này được thực hiện thì lợi ích của chủ thể khác cũng được thực hiện.", "các chủ thể hành động theo những phương thức khác nhau để thực hiện lợi ích của mình.", "các chủ thể cạnh tranh với nhau; ngăn cản, làm tổn hại đến lợi ích của chủ thể khác để thực hiện lợi ích của mình.", "một chủ thể càng thu được nhiều lợi ích kinh tế thì lợi ích của những chủ thể khác càng bị tổn hại."], c: 0, r: "Tính thống nhất xuất phát từ sự phụ thuộc lẫn nhau. Ví dụ: Công ty có làm ăn có lãi (thực hiện lợi ích công ty) thì người lao động mới có tiền thưởng, tăng lương (thực hiện lợi ích cá nhân)." },
                            { q: "Trường hợp nào dưới đây không thể hiện sự thống nhất trong quan hệ lợi ích kinh tế?", a: ["Doanh nghiệp hoạt động càng có hiệu quả, lợi ích doanh nghiệp càng được đảm bảo thì lợi ích của người lao động càng được thực hiện tốt.", "Lợi ích của người lao động càng được thực hiện tốt thì người lao động càng tích cực làm việc và từ đó lợi ích của doanh nghiệp càng được thực hiện tốt.", "Người sử dụng lao động luôn tìm cách cắt giảm tới mức thấp nhất các khoản chi phí, trong đó có tiền lương của người lao động để tăng lợi nhuận.", "Doanh nghiệp cải tiến kĩ thuật, nâng cao chất lượng sản phẩm, thu được nhiều lợi nhuận thì nền kinh tế, đất nước càng phát triển."], c: 2, r: "Hành động chủ doanh nghiệp cố tình chèn ép, bóc lột, cắt giảm tiền lương của công nhân để bỏ túi riêng là biểu hiện của sự đối kháng, mâu thuẫn lợi ích gay gắt chứ không phải là thống nhất." },
                            { q: "Khi nào thì quan hệ lợi ích kinh tế giữa doanh nghiệp và xã hội thống nhất với nhau?", a: ["Doanh nghiệp làm hàng giả, buôn lậu, trốn thuế", "Doanh nghiệp cải tiến kĩ thuật, nâng cao chất lượng sản phẩm", "Có các chính sách cản trở sự phát triển của doanh nghiệp", "Doanh nghiệp xả thải gây ô nhiễm môi trường"], c: 1, r: "Doanh nghiệp cải tiến kĩ thuật giúp họ có lãi cao, đồng thời xã hội được sử dụng hàng hóa chất lượng tốt, giá rẻ và doanh nghiệp nộp thuế nhiều hơn. Đó là sự thống nhất hài hòa hai mặt." },
                            { q: "Khi các chủ thể kinh tế hành động theo những phương thức khác nhau để thực hiện các lợi ích của mình, sự khác nhau đó đến mức đối lập thì trở thành", a: ["hợp tác.", "mâu thuẫn.", "thống nhất.", "cạnh tranh."], c: 1, r: "Khi lợi ích của bên này chỉ có thể đạt được bằng cách tước đoạt, làm tổn hại nặng nề đến lợi ích của bên kia (hoàn toàn đối lập), thì quan hệ đó sẽ bùng phát thành mâu thuẫn." },
                            { q: "Vì lợi ích của mình, các cá nhân hay doanh nghiệp có thể làm hàng giả, buôn lậu, trốn thuế. Khi đó, quan hệ lợi ích cá nhân, doanh nghiệp và lợi ích của xã hội như thế nào?", a: ["Mâu thuẫn với nhau", "Thống nhất với nhau", "Độc lập với nhau", "Hợp tác với nhau"], c: 0, r: "Việc cá nhân/doanh nghiệp làm giàu bất chính gây thất thoát ngân sách, suy hoại kinh tế quốc gia, do đó lợi ích của họ mâu thuẫn gay gắt với lợi ích chung của toàn xã hội." },
                            { q: "Trong trường hợp có mâu thuẫn về quan hệ lợi ích kinh tế, khi chủ doanh nghiệp càng thu được nhiều lợi nhuận thì", a: ["lợi ích của người tiêu dùng, của xã hội càng được đảm bảo.", "lợi ích kinh tế của người tiêu dùng, của xã hội càng bị tổn hại.", "lợi ích kinh tế của người tiêu dùng, của xã hội càng gia tăng.", "lợi ích kinh tế của người tiêu dùng, của xã hội vẫn như cũ."], c: 1, r: "Đã ở trong trạng thái mâu thuẫn (ví dụ tăng giá độc quyền, xả thải bừa bãi), chủ doanh nghiệp vơ vét càng nhiều lợi nhuận thì người tiêu dùng và xã hội càng phải trả giá đắt (bị tổn hại)." },
                            { q: "Trong các hình thức lợi ích kinh tế, lợi ích nào là cơ sở, nền tảng của các lợi ích khác?", a: ["Lợi ích cá nhân", "Lợi ích tập thể", "Lợi ích của nhóm", "Lợi ích xã hội"], c: 0, r: "C. Mác khẳng định con người trước hết phải được thỏa mãn nhu cầu ăn, mặc, ở (lợi ích cá nhân). Vì vậy, lợi ích cá nhân luôn là nền tảng, cơ sở tiên quyết để đóng góp cho tập thể và xã hội." },
                            { q: "Các nhân tố ảnh hưởng đến quan hệ lợi ích kinh tế là", a: ["trình độ phát triển của lực lượng sản xuất; địa vị của chủ thể trong quan hệ sản xuất xã hội; chính sách phân phối thu nhập của nhà nước; hội nhập kinh tế quốc tế.", "trình độ phát triển của quan hệ sản xuất; địa vị của chủ thể trong quan hệ quản lí; chính sách phân phối thu nhập của nhà nước; hội nhập kinh tế quốc tế.", "địa vị của chủ thể trong quan hệ quản lí; trình độ phát triển của nền kinh tế thị trường; kế hoạch sản xuất kinh doanh của doanh nghiệp; hội nhập kinh tế quốc tế.", "trình độ phát triển của quan hệ sản xuất; nguồn nhân lực; chính sách giải quyết việc làm của nhà nước; chính sách đối ngoại."], c: 0, r: "Bốn nhân tố chính chi phối mạnh mẽ nhất bao gồm: Trình độ LLSX, địa vị của các giai cấp trong nền sản xuất, sự can thiệp của Nhà nước bằng chính sách phân phối và làn sóng hội nhập quốc tế." },
                            { q: "Yếu tố ảnh hưởng đến lợi ích kinh tế của các chủ thể sản xuất kinh doanh trên thị trường nội địa khi cạnh tranh với hàng hoá nước ngoài là", a: ["hội nhập kinh tế quốc tế.", "trình độ phát triển của lực lượng sản xuất.", "địa vị của chủ thể trong hệ thống quan hệ sản xuất xã hội.", "chính sách phân phối thu nhập của nhà nước."], c: 0, r: "Tiến trình hội nhập kinh tế quốc tế mở toang cánh cửa thị trường, khiến hàng hóa nước ngoài tràn vào, cạnh tranh trực tiếp và định hình lại lợi ích của các doanh nghiệp nội địa." },
                            { q: "Quan hệ nào dưới đây không phải là quan hệ lợi ích kinh tế cơ bản trong nền kinh tế thị trường?", a: ["Quan hệ lợi ích giữa người lao động và người sử dụng lao động", "Quan hệ lợi ích giữa những người sử dụng lao động", "Quan hệ lợi ích giữa các lợi ích tinh thần của con người", "Quan hệ giữa những người lao động"], c: 2, r: "Lợi ích tinh thần (văn hóa, tín ngưỡng...) không thuộc phạm vi phân tích của phạm trù 'lợi ích kinh tế' - vốn chỉ đề cập đến các quan hệ vật chất, sản xuất, tiền tệ." },
                            { q: "Khẳng định nào dưới đây là đúng khi nói về vai trò của lợi ích xã hội đối với lợi ích cá nhân?", a: ["Lợi ích xã hội đóng vai trò định hướng cho lợi ích cá nhân và các hoạt động thực hiện lợi ích cá nhân.", "Lợi ích xã hội đóng vai trò quyết định cho lợi ích cá nhân và các hoạt động thực hiện lợi ích cá nhân.", "Lợi ích xã hội đóng vai trò giám sát cho lợi ích cá nhân và các hoạt động thực hiện lợi ích cá nhân.", "Lợi ích xã hội độc lập, tách biệt với lợi ích cá nhân và các hoạt động thực hiện lợi ích cá nhân."], c: 0, r: "Lợi ích chung của toàn xã hội (an ninh, văn hóa, môi trường) đóng vai trò như một hành lang đạo đức và pháp lý để 'định hướng' lợi ích cá nhân phát triển lành mạnh, không gây hại cho cộng đồng." },
                            { q: "Khi bán sức lao động, người lao động nhận được tiền lương (hay tiền công) và chịu sự quản lí, điều hành của người sử dụng lao động là nội dung thể hiện cho quan hệ lợi ích kinh tế nào dưới đây?", a: ["Quan hệ lợi ích giữa người lao động và người sử dụng lao động", "Quan hệ lợi ích giữa những người sử dụng lao động", "Quan hệ giữa lợi ích cá nhân, lợi ích nhóm và lợi ích xã hội", "Quan hệ giữa lợi ích giữa những người lao động"], c: 0, r: "Đây là ví dụ điển hình mô tả trực tiếp bản chất mối quan hệ hợp đồng mua bán sức lao động giữa giai cấp công nhân (người lao động) và giới chủ (người sử dụng lao động)." },
                            { q: "Lợi ích kinh tế của người sử dụng lao động thu được trong quá trình kinh doanh là", a: ["chi phí.", "lợi nhuận.", "đầu tư.", "quy mô."], c: 1, r: "Đối với người sử dụng lao động (nhà tư bản), thành quả cuối cùng và mục tiêu tối thượng của mọi nỗ lực kinh doanh chính là Lợi nhuận." },
                            { q: "Khi bán sức lao động của mình cho người sử dụng lao động, lợi ích kinh tế của người lao động là", a: ["lãi suất.", "thu nhập.", "chi phí.", "lợi nhuận."], c: 1, r: "Thông qua việc bán sức lao động, người công nhân sẽ nhận được phần thù lao thặng dư thiết yếu (tiền công/tiền lương), trong giáo trình gọi chung biểu hiện lợi ích đó là Thu nhập." },
                            { q: "Điều kiện quan trọng để thực hiện lợi ích kinh tế giữa người lao động và người sử dụng lao động là", a: ["gia tăng sự cạnh tranh trong quan hệ lợi ích giữa hai bên.", "tạo lập sự thống nhất trong quan hệ lợi ích giữa hai bên.", "gia tăng mâu thuẫn trong quan hệ lợi ích giữa hai bên.", "giảm tiền lương của người lao động, tăng lợi nhuận của người sử dụng lao động."], c: 1, r: "Mối quan hệ này là cộng sinh. Doanh nghiệp cần công nhân tận tụy, công nhân cần doanh nghiệp trả lương cao. Sự thống nhất lợi ích giữa đôi bên là điều kiện để công ty phát triển ổn định." },
                            { q: "Vì lợi ích của mình, người sử dụng lao động luôn tìm cách cắt giảm tới mức thấp nhất các khoản chi phí, trong đó có tiền lương của người lao động để tăng lợi nhuận. Điều này làm cho quan hệ lợi ích giữa người sử dụng lao động và người lao động như thế nào?", a: ["Mâu thuẫn với nhau", "Thống nhất với nhau", "Hợp tác với nhau", "Đồng thuận với nhau"], c: 0, r: "Hành động cố tình ép lương, bóc lột sức lao động để làm giàu cho bản thân giới chủ là nguyên nhân trực tiếp làm nảy sinh mâu thuẫn giai cấp sâu sắc." },
                            { q: "Công đoàn là tổ chức quan trọng nhất bảo vệ quyền lợi của", a: ["doanh nghiệp.", "người sử dụng lao động.", "người lao động.", "công ty."], c: 2, r: "Công đoàn ra đời với tư cách là tổ chức chính trị - xã hội mang sứ mệnh đại diện tiếng nói, chăm lo và bảo vệ quyền lợi hợp pháp cho lực lượng công nhân, người lao động." },
                            { q: "Nghiệp đoàn là tổ chức bảo vệ quyền lợi của", a: ["người lao động làm thuê", "người sử dụng lao động.", "người lao động.", "công nhân trong nhà máy."], c: 1, r: "Trái ngược với Công đoàn, Nghiệp đoàn (hoặc các Hội doanh nhân, hiệp hội ngành nghề) là tổ chức liên kết để bảo vệ quyền lợi cho giới chủ, tức những người sử dụng lao động." },
                            { q: "Trong cơ chế thị trường, những người sử dụng lao động vừa là đối tác, vừa là đối thủ của nhau là sự thể hiện quan hệ lợi ích của các chủ thể nào dưới đây?", a: ["Quan hệ lợi ích giữa người lao động và người sử dụng lao động", "Quan hệ lợi ích giữa những người sử dụng lao động", "Quan hệ giữa lợi ích cá nhân, lợi ích nhóm và lợi ích xã hội", "Quan hệ giữa lợi ích giữa những người lao động"], c: 1, r: "Các doanh nghiệp có thể hợp tác kinh doanh (đối tác) nhưng cũng cạnh tranh khốc liệt trên thương trường (đối thủ). Đây là quan hệ lợi ích trong nội bộ những người sử dụng lao động." },
                            { q: "Nếu có nhiều người bán sức lao động, người lao động phải cạnh tranh với nhau là sự thể hiện quan hệ lợi ích giữa các chủ thể nào dưới đây?", a: ["Quan hệ lợi ích giữa người lao động và người sử dụng lao động", "Quan hệ lợi ích giữa những người sử dụng lao động", "Quan hệ giữa lợi ích cá nhân, lợi ích nhóm và lợi ích xã hội", "Quan hệ lợi ích giữa những người lao động"], c: 3, r: "Khi cung lao động dư thừa, những người công nhân buộc phải chấp nhận giảm lương hoặc đấu đá lẫn nhau để giành lấy việc làm, phản ánh mâu thuẫn nội bộ giữa những người lao động." },
                            { q: "Các cá nhân, tổ chức hoạt động trong cùng ngành, cùng lĩnh vực, liên kết với nhau trong hành động để thực hiện tốt hơn lợi ích riêng (lợi ích cá nhân, tổ chức) của họ hình thành nên", a: ["“lợi ích nhóm”.", "“lợi ích tập thể”.", "“lợi ích xã hội”.", "“lợi ích cá nhân”."], c: 0, r: "Sự liên minh cục bộ của các cá nhân/doanh nghiệp trong CÙNG MỘT NGÀNH để trục lợi, bất chấp lợi ích chung của xã hội, thường được gọi là 'lợi ích nhóm'." },
                            { q: "Các cá nhân, tổ chức hoạt động trong các ngành, lĩnh vực khác nhau nhưng có mối liên hệ với nhau, liên kết với nhau trong hành động để thực hiện tốt hơn lợi ích riêng của mình hình thành nên", a: ["“đồng lợi ích”.", "“nhóm lợi ích”.", "“tổng lợi ích”.", "“lợi ích nhóm”."], c: 1, r: "Sự liên kết rộng rãi giữa nhiều chủ thể thuộc CÁC NGÀNH KHÁC NHAU nhằm hỗ trợ, thúc đẩy lợi ích cho nhau được gọi là 'nhóm lợi ích'." },
                            { q: "Các cá nhân, tổ chức nào dưới đây không phải là biểu hiện của lợi ích nhóm?", a: ["Các hiệp hội ngành nghề", "Mô hình liên kết giữa doanh nghiệp kinh doanh bất động sản – ngân hàng thương mại – người mua nhà", "Các nhóm dân cư chung một số lợi ích theo vùng, theo sở thích", "Các tổ chức chính trị – xã hội"], c: 1, r: "Liên kết Bất động sản - Ngân hàng - Khách hàng thực chất là một chuỗi cung ứng thương mại minh bạch trên thị trường, không mang bản chất cục bộ, móc ngoặc của 'lợi ích nhóm' tiêu cực." },
                            { q: "Các cá nhân, tổ chức nào dưới đây là biểu hiện của nhóm lợi ích?", a: ["Các hiệp hội ngành nghề", "Mô hình liên kết giữa “4 nhà” trong nông nghiệp: nhà nông – nhà doanh nghiệp – nhà khoa học – nhà nước", "Các nhóm dân cư chung một số lợi ích theo vùng, theo sở thích", "Các tổ chức chính trị – xã hội"], c: 1, r: "Mô hình liên kết 4 nhà (nông dân, doanh nghiệp, khoa học, nhà nước) là một hình mẫu tích cực của 'nhóm lợi ích', nơi các bên ở nhiều lĩnh vực phối hợp nhịp nhàng để đạt lợi ích chung." },
                            { q: "Khẳng định nào dưới đây là đúng khi nói về phương thức thực hiện lợi ích kinh tế trong các quan hệ lợi ích chủ yếu của nền kinh tế thị trường định hướng xã hội chủ nghĩa?", a: ["Thực hiện lợi ích kinh tế theo nguyên tắc thị trường; theo chính sách của nhà nước và vai trò của các tổ chức xã hội", "Thực hiện lợi ích kinh tế theo các nguyên tắc của thị trường, chính sách của doanh nghiệp và vai trò của doanh nghiệp", "Thực hiện lợi ích kinh tế theo chính sách của nhà nước và vai trò của các tổ chức xã hội, không theo nguyên tắc thị trường", "Thực hiện lợi ích kinh tế theo nguyên tắc thị trường; không theo chính sách của nhà nước và vai trò của các tổ chức xã hội"], c: 0, r: "Đặc thù của kinh tế Việt Nam là sự đan xen giữa sự vận hành tự do theo cơ chế thị trường nhưng phải chịu sự quản lý, điều tiết bằng chính sách của Nhà nước và giám sát của xã hội." },
                            { q: "Yếu tố đảm bảo sự hài hoà lợi ích kinh tế trong nền kinh tế thị trường định hướng xã hội chủ nghĩa là", a: ["kinh tế thị trường và sự can thiệp của doanh nghiệp.", "kinh tế thị trường và sự can thiệp của nhà nước.", "kinh tế thị trường thuần tuý.", "dân cư, tập thể, người lao động."], c: 1, r: "Thị trường tự do luôn có khuyết tật 'cá lớn nuốt cá bé'. Bàn tay hữu hình (sự can thiệp, phân phối lại thu nhập của Nhà nước) là chìa khóa duy nhất để dung hòa lợi ích các giai cấp." },
                            { q: "Vai trò của nhà nước trong việc bảo đảm hài hoà các quan hệ lợi ích không thể hiện ở nội dung nào dưới đây?", a: ["Bảo vệ lợi ích hợp pháp, tạo môi trường thuận lợi cho hoạt động tìm kiếm lợi ích của các chủ thể kinh tế", "Gia tăng xung đột lợi ích giữa cá nhân – doanh nghiệp – xã hội", "Kiểm soát, ngăn ngừa các quan hệ lợi ích có ảnh hưởng tiêu cực đối với sự phát triển xã hội", "Giải quyết những mâu thuẫn trong quan hệ lợi ích kinh tế"], c: 1, r: "Nhà nước là trọng tài đứng ra giải quyết tranh chấp để xã hội bình yên phát triển. Việc nói Nhà nước 'gia tăng xung đột lợi ích' là hoàn toàn vô lý và sai bản chất." },
                            { q: "Nguyên tắc giải quyết mâu thuẫn giữa các lợi ích kinh tế là", a: ["đặt lợi ích của doanh nghiệp lên trên hết, khi có mâu thuẫn thì các bên tự hoà giải.", "đặt lợi ích của nhóm lên trên hết, không nhân nhượng và không có sự tham gia của các bên.", "phải có sự tham gia của các bên liên quan, có nhân nhượng và đặt lợi ích của đất nước lên trên hết.", "phải có sự tham gia của các bên liên quan, không nhân nhượng và đặt lợi ích cá nhân lên trên hết."], c: 2, r: "Nguyên tắc vàng khi đàm phán mâu thuẫn là các bên phải ngồi lại, biết thỏa hiệp, nhân nhượng, nhưng tuyệt đối phải đặt lợi ích tối cao của quốc gia, dân tộc lên hàng đầu." }
                        ]
                    },
                     6: {
                        title: "Chương 6: Công nghiệp hoá, hiện đại hoá và hội nhập kinh tế quốc tế của Việt Nam",
                        questions: [
                            { q: "Điền từ ngữ thích hợp vào chỗ chấm: Cách mạng công nghiệp là những bước phát triển ...(1)... về chất trình độ của tư liệu lao động trên cơ sở những ...(2)... về kĩ thuật và công nghệ trong quá trình phát triển của nhân loại kéo theo sự thay đổi căn bản về phân công lao động xã hội cũng như tạo bước phát triển ...(3)... cao hơn hẳn nhờ áp dụng một cách phổ biến những tính năng mới trong kĩ thuật – công nghệ đó vào đời sống xã hội.", a: ["(1) đột phá; (2) phát minh nhảy vọt; (3) cường độ lao động", "(1) đột phá; (2) phát minh nhảy vọt; (3) năng suất lao động", "(1) nhảy vọt; (2) phát minh đột phá; (3) cường độ lao động", "(1) nhảy vọt; (2) phát minh đột phá; (3) năng suất lao động"], c: 3, r: "Cách mạng công nghiệp tạo ra những bước nhảy vọt nhờ các phát minh đột phá, từ đó giúp nâng cao năng suất lao động xã hội lên một tầm cao mới." },
                            { q: "Cách mạng công nghiệp lần thứ nhất khởi phát ở quốc gia nào?", a: ["Anh", "Pháp", "Mỹ", "Đức"], c: 0, r: "Cuộc cách mạng công nghiệp lần thứ nhất khởi phát đầu tiên ở nước Anh vào khoảng giữa thế kỷ XVIII, bắt đầu từ ngành dệt." },
                            { q: "Cách mạng công nghiệp lần thứ nhất diễn ra vào khoảng thời gian nào?", a: ["Từ giữa thế kỉ XVI đến giữa thế kỉ XVII", "Từ giữa thế kỉ XVII đến đầu thế kỉ XVIII", "Từ giữa thế kỉ XVIII đến giữa thế kỉ XIX", "Từ giữa thế kỉ XIX đến đầu thế kỉ XX"], c: 2, r: "CMCN lần thứ nhất diễn ra từ giữa thế kỉ XVIII (khoảng những năm 1760) và kéo dài đến giữa thế kỉ XIX." },
                            { q: "Tiền đề của cuộc Cách mạng công nghiệp lần thứ nhất được phát triển trước hết trong lĩnh vực nào?", a: ["Dệt vải", "Cơ khí", "Tự động", "Hoá chất"], c: 0, r: "Cách mạng công nghiệp lần thứ nhất ở Anh bắt nguồn từ những phát minh kĩ thuật trong ngành dệt vải (như thoi bay, máy kéo sợi tự động...)." },
                            { q: "Chuyển từ lao động thủ công sang lao động sử dụng máy móc, thực hiện cơ giới hoá sản xuất bằng việc sử dụng năng lượng nước và hơi nước là nội dung cơ bản của cuộc cách mạng công nghiệp nào?", a: ["Cách mạng công nghiệp lần thứ nhất", "Cách mạng công nghiệp lần thứ hai", "Cách mạng công nghiệp lần thứ ba", "Cách mạng công nghiệp lần thứ tư"], c: 0, r: "Sự xuất hiện của động cơ hơi nước của James Watt (1784) là biểu tượng cốt lõi của CMCN lần thứ nhất, thay thế sức người bằng năng lượng nước và hơi nước." },
                            { q: "Cuộc cách mạng công nghiệp lần thứ nhất có đặc trưng nào?", a: ["Sử dụng năng lượng nước và hơi nước để cơ khí hoá sản xuất", "Sử dụng năng lượng điện và động cơ điện để tạo ra dây chuyền sản xuất hàng loạt", "Sử dụng công nghệ thông tin và máy tính để tự động hoá sản xuất", "Liên kết giữa thế giới thực và ảo để thực hiện công việc thông minh và hiệu quả nhất"], c: 0, r: "Đặc trưng lớn nhất của giai đoạn này là cơ khí hóa sản xuất dựa trên động cơ hơi nước và sức nước." },
                            { q: "C. Mác đã khái quát tính quy luật của cuộc Cách mạng công nghiệp lần thứ nhất qua ba giai đoạn phát triển lần lượt là", a: ["hiệp tác giản đơn, đại công nghiệp và công trường thủ công.", "công trường thủ công, hiệp tác giản đơn và đại công nghiệp.", "hiệp tác giản đơn, công trường thủ công và đại công nghiệp.", "đại công nghiệp, hiệp tác giản đơn và công trường thủ công."], c: 2, r: "Lịch sử phát triển sản xuất tư bản chủ nghĩa diễn ra theo 3 nấc thang: Bắt đầu từ hiệp tác giản đơn, tiến lên công trường thủ công và bùng nổ thành đại công nghiệp." },
                            { q: "Cách mạng công nghiệp lần thứ hai diễn ra vào khoảng thời gian nào dưới đây?", a: ["Từ giữa thế kỉ XVI đến giữa thế kỉ XVII", "Từ nửa cuối thế kỉ XVII đến đầu thế kỉ XVIII", "Từ nửa cuối thế kỉ XIX đến đầu thế kỉ XX", "Từ giữa thế kỉ XIX đến cuối thế kỉ XX"], c: 2, r: "CMCN lần thứ hai diễn ra từ nửa cuối thế kỉ XIX (khoảng những năm 1870) và kéo dài đến đầu thế kỉ XX trước Chiến tranh thế giới thứ nhất." },
                            { q: "Điền từ ngữ thích hợp vào chỗ chấm: Nội dung của Cách mạng công nghiệp lần thứ hai được thể hiện ở việc sử dụng năng lượng ...(1)... và động cơ điện, để tạo ra các ...(2)... có tính chuyên môn hoá cao, chuyển nền sản xuất ...(3)... sang nền sản xuất điện – cơ khí và sang giai đoạn ...(4)... cục bộ trong sản xuất.", a: ["(1) điện; (2) dây chuyền sản xuất; (3) cơ khí; (4) tự động hoá", "(1) nước; (2) dây chuyền sản xuất; (3) tự động hoá; (4) cơ khí", "(1) nước; (2) xí nghiệp sản xuất; (3) cơ khí; (4) tự động hoá", "(1) điện; (2) dây chuyền sản xuất; (3) thủ công; (4) tự động hoá"], c: 0, r: "CMCN 2 gắn liền với năng lượng điện, dây chuyền sản xuất hàng loạt và những bước tự động hóa cục bộ ban đầu." },
                            { q: "Cuộc Cách mạng công nghiệp lần thứ hai có đặc trưng nào?", a: ["Sử dụng năng lượng nước và hơi nước để cơ khí hoá sản xuất", "Sử dụng năng lượng điện và động cơ điện để tạo ra dây chuyền sản xuất hàng loạt", "Sử dụng công nghệ thông tin và máy tính để tự động hoá sản xuất", "Sử dụng trí tuệ nhân tạo, liên kết giữa thế giới thực và ảo để thực hiện công việc thông minh"], c: 1, r: "Sự phát minh ra điện năng và ứng dụng dây chuyền lắp ráp hàng loạt (tiêu biểu như dây chuyền của Henry Ford) là đặc trưng của CMCN lần hai." },
                            { q: "Cách mạng công nghiệp lần thứ ba bắt đầu vào khoảng thời gian nào?", a: ["Những năm cuối thập niên 40 của thế kỉ XX đến cuối thế kỉ XX", "Những năm cuối thập niên 50 của thế kỉ XX đến cuối thế kỉ XX", "Những năm đầu thập niên 60 của thế kỉ XX đến cuối thế kỉ XX", "Những năm đầu thập niên 70 của thế kỉ XX đến cuối thế kỉ XX"], c: 2, r: "Cuộc CMCN lần thứ ba (Cách mạng máy tính/số hóa) bắt đầu từ đầu những năm 1960 (với sự ra đời của máy tính điện tử, bóng bán dẫn)." },
                            { q: "Đặc trưng cơ bản của cuộc Cách mạng công nghiệp lần thứ ba là", a: ["sử dụng công nghệ thông tin và máy tính để tự động hoá sản xuất.", "sử dụng năng lượng nước và hơi nước để cơ khí hoá sản xuất.", "sử dụng năng lượng điện và động cơ điện để tạo ra dây chuyền sản xuất hàng loạt.", "liên kết giữa thế giới thực và ảo để thực hiện công việc thông minh và hiệu quả nhất."], c: 0, r: "Trọng tâm của CMCN 3 là sự bùng nổ của máy tính, công nghệ thông tin (IT) giúp tự động hóa cao độ quá trình sản xuất." },
                            { q: "Internet ra đời vào khoảng thời gian nào của thế kỉ XX?", a: ["Thập niên 60", "Thập niên 70", "Thập niên 80", "Thập niên 90"], c: 3, r: "Mặc dù mạng nội bộ đã có từ trước, nhưng sự ra đời của World Wide Web và mạng Internet phổ biến toàn cầu bùng nổ vào thập niên 1990." },
                            { q: "Cách mạng công nghiệp lần thứ tư được đề cập lần đầu tiên tại Hội chợ triển lãm công nghệ Hannover (Cộng hoà liên bang Đức) vào năm nào?", a: ["2010", "2011", "2012", "2013"], c: 1, r: "Khái niệm Công nghiệp 4.0 (Industry 4.0) được Chính phủ Đức đưa ra lần đầu tiên tại Hội chợ Hannover vào năm 2011." },
                            { q: "Cách mạng số, gắn với sự phát triển và phổ biến của internet kết nối vạn vật với nhau (Internet of Things – IoT) là cơ sở hình thành của cuộc cách mạng nào?", a: ["Cách mạng công nghiệp lần thứ nhất", "Cách mạng công nghiệp lần thứ hai", "Cách mạng công nghiệp lần thứ ba", "Cách mạng công nghiệp lần thứ tư"], c: 3, r: "Cách mạng công nghiệp lần thứ tư (4.0) được xây dựng trên nền tảng vạn vật kết nối Internet (IoT), dữ liệu lớn và AI." },
                            { q: "Cách mạng công nghiệp lần thứ tư có sự xuất hiện các công nghệ mới là", a: ["công nghệ thông tin và máy tính.", "trí tuệ nhân tạo, big data, in 3D,...", "động cơ điện, động cơ đốt trong,...", "ngành chế tạo ôtô, điện thoại,..."], c: 1, r: "Các công nghệ lõi của CMCN 4.0 bao gồm Trí tuệ nhân tạo (AI), Dữ liệu lớn (Big Data), in 3D, điện toán đám mây..." },
                            { q: "Quá trình chuyển đổi nền sản xuất xã hội từ dựa trên lao động thủ công là chính sang nền sản xuất xã hội dựa chủ yếu trên lao động bằng máy móc nhằm tạo ra năng suất lao động xã hội cao là nội dung của khái niệm nào?", a: ["Công nghiệp hoá", "Hiện đại hoá", "Tăng trưởng kinh tế", "Phát triển kinh tế"], c: 0, r: "Đây là định nghĩa kinh điển của Công nghiệp hóa: chuyển từ lao động thủ công sang lao động bằng máy móc cơ khí." },
                            { q: "Quốc gia nào dưới đây tiêu biểu cho mô hình công nghiệp hoá cổ điển?", a: ["Anh", "Nhật Bản", "Hàn Quốc", "Đức"], c: 0, r: "Nước Anh là quốc gia đầu tiên trên thế giới thực hiện và hoàn thành công nghiệp hóa (mô hình cổ điển bắt đầu từ công nghiệp nhẹ)." },
                            { q: "Nguồn vốn chủ yếu để công nghiệp hoá ở các nước tư bản cổ điển không đến từ nguồn nào dưới đây?", a: ["Khai thác lao động làm thuê", "Làm phá sản những người sản xuất nhỏ trong nông nghiệp", "Nhận viện trợ từ các quốc gia phát triển", "Xâm chiếm và cướp bóc thuộc địa"], c: 2, r: "Ở thời kỳ đó, các nước tư bản cổ điển (như Anh, Pháp) là những nước đi đầu, họ tích lũy vốn bằng cách bóc lột công nhân, tước đoạt nông dân và cướp bóc thuộc địa chứ không hề có viện trợ quốc tế." },
                            { q: "Quá trình công nghiệp hoá ở các nước tư bản cổ điển diễn ra trung bình khoảng", a: ["10 đến 20 năm.", "20 đến 30 năm.", "40 đến 50 năm.", "60 đến 80 năm."], c: 3, r: "Do trình độ khoa học kỹ thuật lúc bấy giờ còn sơ khai, công nghiệp hóa cổ điển phải mất từ 60 đến 80 năm (thậm chí lâu hơn) mới hoàn thành." },
                            { q: "Mô hình công nghiệp hoá kiểu Liên Xô bắt đầu vào khoảng thời gian nào và ở đâu?", a: ["Đầu những năm 1930 ở Liên Xô", "Đầu những năm 1945 ở Liên Xô", "Đầu những năm 1930 ở Đông Âu", "Đầu những năm 1945 ở Đông Âu"], c: 0, r: "Liên Xô bắt đầu thực hiện các kế hoạch 5 năm để công nghiệp hóa xã hội chủ nghĩa từ đầu những năm 1930." },
                            { q: "Con đường công nghiệp hoá kiểu Liên Xô thường ưu tiên phát triển ngành", a: ["nông nghiệp.", "công nghiệp nặng.", "dịch vụ.", "công nghiệp nhẹ."], c: 1, r: "Đặc trưng lớn nhất của mô hình Liên Xô là dồn toàn lực, ưu tiên phát triển công nghiệp nặng (chế tạo máy, luyện kim) để tự chủ nền kinh tế quốc phòng." },
                            { q: "Quốc gia nào lựa chọn mô hình công nghiệp hoá rút ngắn?", a: ["Anh", "Đức", "Liên Xô", "Hàn Quốc"], c: 3, r: "Hàn Quốc, Nhật Bản và các nước NICs là những nước đi sau, họ áp dụng chiến lược hướng vào xuất khẩu và tiếp thu công nghệ để 'rút ngắn' thời gian công nghiệp hóa." },
                            { q: "Quốc gia nào thuộc nhóm các nước công nghiệp mới (NICs)?", a: ["Hoa Kỳ", "Singapore", "Việt Nam", "Trung Quốc"], c: 1, r: "Singapore cùng với Hàn Quốc, Đài Loan, Hong Kong là những 'con rồng châu Á' tiêu biểu cho nhóm các nước công nghiệp mới (NICs)." },
                            { q: "Các nước công nghiệp mới (NICs) trung bình mất khoảng bao nhiêu năm để thực hiện thành công quá trình công nghiệp hoá, hiện đại hoá?", a: ["10 đến 15 năm", "20 đến 30 năm", "30 đến 40 năm", "60 đến 80 năm"], c: 1, r: "Nhờ đi tắt đón đầu, thu hút vốn và công nghệ quốc tế, các nước NICs chỉ mất khoảng 20-30 năm để hoàn thành CNH, HĐH." },
                            { q: "Nhật Bản và các nước công nghiệp mới (NICs) đã sử dụng con đường nào để tiến hành công nghiệp hoá, hiện đại hoá?", a: ["Đầu tư nghiên cứu, chế tạo và hoàn thiện dần từ trình độ thấp đến trình độ cao", "Tiếp nhận đầu tư công nghệ hiện đại từ các nước phát triển hơn", "Xây dựng chiến lược phát triển khoa học – công nghệ nhiều tầng, kết hợp cả công nghệ truyền thống và công nghệ hiện đại", "Thực hiện công nghiệp hoá tách rời với hiện đại hoá, ưu tiên đầu tư các ngành công nghiệp nặng"], c: 1, r: "Con đường thành công của họ là mở cửa, tiếp nhận đầu tư và chuyển giao công nghệ tiên tiến từ các nước phát triển phương Tây." },
                            { q: "Ngày nay, các nước đi sau muốn rút ngắn thời gian thực hiện quá trình công nghiệp hoá, hiện đại hoá cần chú ý", a: ["khai thác tốt lợi thế trong nước và tận dụng, tiếp thu những nguồn lực, thành tựu khoa học, công nghệ mới của các nước tiên tiến.", "khai thác triệt để, tối đa các nguồn lực trong nước, không nên tiếp nhận chuyển giao công nghệ từ các nước khác.", "chú trọng tiếp nhận chuyển giao công nghệ từ các nước tiên tiến, chỉ dựa vào nguồn lực từ các nước phát triển.", "dựa vào nguồn lực vốn có của quốc gia, thực hiện các bước đi tuần tự từ công nghiệp hoá rồi đến hiện đại hoá."], c: 0, r: "Bài học lớn nhất là phải kết hợp nội lực (lợi thế trong nước) làm nền tảng và ngoại lực (vốn, công nghệ nước ngoài) làm đòn bẩy để đi tắt đón đầu." },
                            { q: "Nội dung nào dưới đây không thể hiện vai trò của cách mạng công nghiệp đối với sự phát triển?", a: ["Thúc đẩy sự phát triển lực lượng sản xuất", "Thúc đẩy sự ra đời của các tổ chức độc quyền", "Thúc đẩy đổi mới phương thức quản trị phát triển", "Thúc đẩy hoàn thiện quan hệ sản xuất"], c: 0, r: "Lưu ý: Sách giáo trình in đáp án câu này là A. Tuy nhiên về mặt lí luận, 'thúc đẩy phát triển LLSX' chính là vai trò quan trọng nhất của CMCN. Phương án B (Thúc đẩy sự ra đời các tổ chức độc quyền) mới là đáp án hợp lí cho câu hỏi 'không thể hiện vai trò phát triển chung'. Ở đây dữ liệu được cấu hình giữ nguyên theo bản gốc của sách." },
                            { q: "Công nghệ kĩ thuật số và internet đã tạo điều kiện để chuyển biến các nền kinh tế công nghiệp sang", a: ["nền kinh tế tri thức.", "nền kinh tế số hoá.", "nền kinh tế độc quyền.", "nền kinh tế thị trường."], c: 0, r: "Sự bùng nổ của mạng lưới thông tin và số hóa đã làm chất xám (tri thức) trở thành tài nguyên đắt giá nhất, chuyển nền kinh tế sang giai đoạn Kinh tế tri thức." },
                            { q: "“Chính phủ điện tử” là khái niệm xuất hiện từ cuộc cách mạng công nghiệp lần thứ mấy?", a: ["Lần thứ nhất", "Lần thứ hai", "Lần thứ ba", "Lần thứ tư"], c: 2, r: "Chính phủ điện tử ra đời dựa trên sự phổ cập của máy tính và Internet, vốn là thành tựu cốt lõi của CMCN lần thứ 3." },
                            { q: "“Đô thị thông minh” là khái niệm gắn với sự phát triển của cuộc cách mạng công nghiệp lần thứ mấy?", a: ["Lần thứ nhất", "Lần thứ hai", "Lần thứ ba", "Lần thứ tư"], c: 3, r: "Đô thị thông minh đòi hỏi sự kết nối tự động vạn vật (IoT), xử lý Dữ liệu lớn (Big Data) và AI - là sản phẩm của CMCN lần 4." },
                            { q: "Nội dung nào sau đây không phải là đặc điểm chủ yếu của quá trình công nghiệp hoá, hiện đại hoá ở Việt Nam?", a: ["Công nghiệp hoá, hiện đại hoá theo định hướng xã hội chủ nghĩa, thực hiện mục tiêu “dân giàu, nước mạnh, dân chủ, công bằng, văn minh”", "Công nghiệp hoá, hiện đại hoá gắn với phát triển kinh tế tri thức", "Công nghiệp hoá, hiện đại hoá trong điều kiện kinh tế thị trường định hướng xã hội chủ nghĩa", "Công nghiệp hoá, hiện đại hoá trong bối cảnh hạn chế hợp tác, hội nhập kinh tế quốc tế"], c: 3, r: "Đường lối của Đảng ta là hội nhập quốc tế toàn diện, sâu rộng. Việc 'hạn chế hợp tác, hội nhập' đi ngược hoàn toàn với chủ trương này." },
                            { q: "Điền từ ngữ thích hợp vào chỗ chấm: Công nghiệp hoá, hiện đại hoá là quá trình chuyển đổi căn bản, ...(1)... các hoạt động sản xuất kinh doanh, dịch vụ và quản lí kinh tế – xã hội, từ sử dụng sức lao động ...(2)... là chính sang sử dụng một cách phổ biến sức lao động với ...(3)..., phương tiện, phương pháp tiên tiến hiện đại dựa trên sự phát triển của công nghiệp và tiến bộ khoa học – công nghệ, nhằm tạo ra ...(4)... xã hội cao.", a: ["(1) toàn diện; (2) thủ công; (3) công nghệ; (4) năng suất lao động", "(1) chủ yếu; (2) thủ công; (3) khoa học; (4) năng suất lao động", "(1) toàn diện; (2) thủ công; (3) khoa học; (4) cường độ lao động", "(1) chủ yếu; (2) thủ công; (3) công nghệ; (4) cường độ lao động"], c: 0, r: "Định nghĩa chuẩn xác: chuyển đổi toàn diện, từ lao động thủ công sang sử dụng công nghệ tiên tiến, nhằm tạo ra năng suất lao động xã hội cao." },
                            { q: "Quan điểm nào dưới đây không đúng khi lí giải về tính tất yếu của quá trình công nghiệp hoá, hiện đại hoá ở nước ta?", a: ["Công nghiệp hoá là quy luật phổ biến của sự phát triển lực lượng sản xuất xã hội đối với mọi quốc gia.", "Công nghiệp hoá, hiện đại hoá giúp nước ta xây dựng cơ sở vật chất – kĩ thuật để quá độ lên chủ nghĩa xã hội từ một nước có nền kinh tế kém phát triển.", "Công nghiệp hoá, hiện đại hoá làm cho khối liên minh công nhân, nông dân và trí thức ngày càng được tăng cường, củng cố; nâng cao vai trò lãnh đạo của giai cấp công nhân.", "Công nghiệp hoá, hiện đại hoá để phát triển cơ chế kinh tế tập trung, quan liêu, bao cấp."], c: 3, r: "Mục tiêu của CNH, HĐH là để xây dựng nền kinh tế thị trường hiện đại và cơ sở vật chất cho XHCN, đồng thời phá bỏ hoàn toàn cơ chế quan liêu, bao cấp lạc hậu." },
                            { q: "Trong nền kinh tế tri thức, tri thức đóng vai trò là", a: ["lực lượng sản xuất trực tiếp.", "lực lượng sản xuất gián tiếp.", "quan hệ sản xuất đặc trưng.", "quan hệ sản xuất thứ yếu."], c: 0, r: "Trong nền kinh tế tri thức, khoa học công nghệ (tri thức) không còn nằm trên giấy mà đã thẩm thấu vào máy móc, trở thành lực lượng sản xuất trực tiếp tạo ra của cải." },
                            { q: "Nội dung nào dưới đây là đặc điểm chủ yếu của nền kinh tế tri thức?", a: ["Các ngành kinh tế thủ công, dựa vào sức lao động của con người là chính, ngày càng tăng và chiếm đa số.", "Học tập trở thành yêu cầu thường xuyên đối với mọi người và phát triển công nghiệp nặng trở thành nhiệm vụ trung tâm của xã hội.", "Tri thức trở thành lực lượng sản xuất trực tiếp, là nguồn lực quan trọng hàng đầu, quyết định sự tăng trưởng – phát triển kinh tế.", "Trí tuệ nhân tạo được ứng dụng rộng rãi trong mọi lĩnh vực và thiết lập được các mạng thông tin đa phương tiện phủ khắp nước."], c: 2, r: "Đặc điểm cốt lõi nhất làm nên tên gọi 'Kinh tế tri thức' là việc tri thức đã vươn lên trở thành yếu tố quyết định hàng đầu (thay thế vốn, lao động cơ bắp) để tạo ra tăng trưởng." },
                            { q: "Nội dung nào dưới đây không phải là đặc điểm chủ yếu của nền kinh tế tri thức?", a: ["Công nghệ thông tin được ứng dụng rộng rãi trong mọi lĩnh vực và thiết lập được các mạng thông tin đa phương tiện phủ khắp nước.", "Học tập trở thành yêu cầu thường xuyên đối với mọi người và phát triển con người trở thành nhiệm vụ trung tâm của xã hội.", "Các ngành kinh tế dựa vào tri thức, dựa vào các thành tựu mới nhất của khoa học và công nghệ ngày càng tăng và chiếm đa số.", "Các ngành kinh tế thủ công, dựa vào sức lao động của con người là chính ngày càng tăng và chiếm đa số."], c: 3, r: "Trong nền kinh tế tri thức, lao động thủ công cơ bắp sẽ bị thu hẹp lại, nhường chỗ cho lao động trí óc và tự động hóa. Do đó mệnh đề D là hoàn toàn sai." },
                            { q: "Nội dung của công nghiệp hoá, hiện đại hoá ở Việt Nam là", a: ["tạo lập những điều kiện và thực hiện các nhiệm vụ để chuyển đổi nền sản xuất – xã hội lạc hậu sang nền sản xuất – xã hội hiện đại.", "tăng cường nhận viện trợ và thực hiện các nhiệm vụ để chuyển đổi nền sản xuất – xã hội lạc hậu sang nền sản xuất – xã hội hiện đại.", "tạo lập những điều kiện trong nước và và tăng cường nhận viện trợ nước ngoài để chuyển đổi nền sản xuất – xã hội lạc hậu sang nền sản xuất – xã hội hiện đại.", "tăng cường hợp tác, đầu tư quốc tế, từng bước hoàn thiện lực lượng sản xuất phù hợp với trình độ phát triển của quan hệ sản xuất."], c: 0, r: "Bản chất nội dung là một cuộc cách mạng toàn diện nhằm kiến tạo các điều kiện vật chất, thể chế để đưa nền kinh tế đi lên trạng thái hiện đại." },
                            { q: "Nhiệm vụ nào dưới đây không phải là nhiệm vụ cần thực hiện để chuyển đổi nền sản xuất – xã hội lạc hậu sang nền sản xuất – xã hội hiện đại ở nước ta?", a: ["Đẩy mạnh ứng dụng những thành tựu của khoa học – công nghệ mới hiện đại.", "Chuyển dịch cơ cấu kinh tế theo hướng hiện đại, hợp lí và hiệu quả.", "Từng bước hoàn thiện lực lượng sản xuất phù hợp với trình độ phát triển của quan hệ sản xuất.", "Sẵn sàng thích ứng với tác động của bối cảnh cuộc Cách mạng công nghiệp lần thứ tư."], c: 2, r: "Theo quy luật khách quan, QHSX phải thay đổi và hoàn thiện để phù hợp với trình độ phát triển của LLSX (LLSX là yếu tố động, đi trước). Việc nói ngược lại là sai lý luận Mác-xít." },
                            { q: "Mối quan hệ tỉ lệ giữa các ngành, các vùng và các thành phần kinh tế là nội dung của khái niệm nào?", a: ["Phát triển kinh tế", "Cơ cấu kinh tế", "Thành phần kinh tế", "Tăng trưởng kinh tế"], c: 1, r: "Cơ cấu kinh tế là tổng thể các ngành, các vùng và các thành phần kinh tế cùng với mối quan hệ tỉ lệ hữu cơ giữa chúng." },
                            { q: "Cơ cấu kinh tế bao gồm", a: ["cơ cấu ngành, cơ cấu vùng và cơ cấu nguồn lực kinh tế.", "cơ cấu ngành, cơ cấu nguồn lực và cơ cấu thành phần kinh tế.", "cơ cấu ngành, cơ cấu vùng và cơ cấu thành phần kinh tế.", "cơ cấu nguồn lực, cơ cấu vùng và cơ cấu thành phần kinh tế."], c: 2, r: "Cơ cấu kinh tế của một quốc gia được cấu thành từ 3 bộ phận cốt lõi: cơ cấu ngành, cơ cấu vùng và cơ cấu thành phần kinh tế." },
                            { q: "Trong hệ thống cơ cấu kinh tế, cơ cấu giữ vị trí quan trọng nhất là", a: ["cơ cấu ngành kinh tế.", "cơ cấu vùng kinh tế.", "cơ cấu nguồn lực kinh tế.", "cơ cấu thành phần kinh tế."], c: 0, r: "Cơ cấu ngành kinh tế đóng vai trò nòng cốt và quan trọng nhất, vì nó phản ánh rõ nét nhất trình độ phân công lao động và sự phát triển của lực lượng sản xuất." },
                            { q: "Chuyển dịch cơ cấu ngành kinh tế theo hướng nào dưới đây được coi là hiện đại và hiệu quả?", a: ["Tăng tỉ trọng ngành nông nghiệp và dịch vụ, giảm tỉ trọng ngành công nghiệp", "Tăng tỉ trọng ngành công nghiệp và dịch vụ, giảm tỉ trọng ngành nông nghiệp", "Tăng tỉ trọng ngành dịch vụ, giảm tỉ trọng ngành công nghiệp và nông nghiệp", "Tăng tỉ trọng ngành nông nghiệp, giảm tỉ trọng ngành công nghiệp và dịch vụ"], c: 1, r: "Hướng chuyển dịch hiện đại của quá trình CNH-HĐH là phải làm giảm tỉ trọng khu vực nông nghiệp, đồng thời tăng mạnh tỉ trọng của khu vực công nghiệp - xây dựng và dịch vụ." },
                            { q: "Nội dung nào dưới đây không phải là yêu cầu cần đáp ứng của một cơ cấu kinh tế hợp lí, hiện đại và hiệu quả?", a: ["Khai thác, phân bổ và phát huy hiệu quả các nguồn lực trong nước, thu hút có hiệu quả các nguồn lực bên ngoài để phát triển kinh tế – xã hội", "Phù hợp với cơ cấu kinh tế của tất cả các nước tiên tiến, hiện đại, có nền kinh tế phát triển cao trên thế giới", "Cho phép ứng dụng những thành tựu khoa học – công nghệ mới, hiện đại vào các ngành, các vùng và các lĩnh vực của nền kinh tế", "Phù hợp với xu thế phát triển chung của nền kinh tế và yêu cầu của toàn cầu hoá và hội nhập quốc tế"], c: 1, r: "Mỗi quốc gia có đặc thù tự nhiên, lịch sử và trình độ khác nhau, do đó không thể sao chép rập khuôn hay bắt buộc phải 'phù hợp với cơ cấu của tất cả các nước tiên tiến'." },
                            { q: "Một trong những nội dung chủ yếu mà công nghiệp hoá, hiện đại hoá ở Việt Nam cần thực hiện để thích ứng với tác động của cuộc Cách mạng công nghiệp lần thứ tư là", a: ["duy trì, củng cố khung pháp lí hiện tại để khẳng định vai trò quan trọng của Nhà nước về kinh tế.", "hoàn thiện thể chế, xây dựng nền kinh tế dựa trên nền tảng đổi mới, sáng tạo.", "hạn chế tối đa các nguồn lực của Nhà nước, của toàn dân để phục vụ cho nghiên cứu, triển khai, ứng dụng các thành tựu của cách mạng công nghiệp.", "tập trung chủ yếu việc huy động, khai thác nguồn lực nước ngoài để phát triển nhanh chóng hạ tầng công nghệ thông tin và truyền thông."], c: 1, r: "Xây dựng nền kinh tế dựa trên nền tảng đổi mới và sáng tạo là chìa khóa cốt lõi nhất để Việt Nam tận dụng cơ hội và thích ứng với làn sóng công nghệ 4.0." },
                            { q: "Cơ cấu ngành kinh tế giữ vị trí quan trọng nhất trong hệ thống cơ cấu kinh tế vì", a: ["phản ánh trình độ phát triển của nền kinh tế và kết quả của quá trình thực hiện công nghiệp hoá, hiện đại hoá.", "là biểu hiện duy nhất của cơ cấu kinh tế và là thước đo kết quả của quá trình thực hiện công nghiệp hoá, hiện đại hoá.", "tập trung mọi nguồn lực của nền kinh tế và quyết định kết quả của quá trình thực hiện công nghiệp hoá, hiện đại hoá.", "không bị ảnh hưởng bởi cơ cấu kinh tế khác và quyết định kết quả của quá trình thực hiện công nghiệp hoá, hiện đại hoá."], c: 0, r: "Sự phân bổ tỉ trọng các ngành (Nông - Công - Dịch vụ) là thước đo trực quan, phản ánh mức độ tiến bộ của nền kinh tế và kết quả của công cuộc CNH, HĐH." },
                            { q: "Nhiệm vụ nào dưới đây không phải là nhiệm vụ mà công nghiệp hoá, hiện đại hoá ở nước ta cần thực hiện để ứng phó với những tác động tiêu cực của cuộc Cách mạng công nghiệp lần thứ tư?", a: ["Huy động tối đa các nguồn vốn viện trợ từ nước ngoài", "Thực hiện chuyển đổi số nền kinh tế và quản trị xã hội", "Đẩy mạnh công nghiệp hoá, hiện đại hoá nông nghiệp, nông thôn", "Phát triển nguồn nhân lực đặc biệt là nguồn nhân lực chất lượng cao"], c: 0, r: "Trong bối cảnh 4.0, 'Huy động tối đa vốn viện trợ' không phải là nhiệm vụ cốt lõi hay giải pháp căn cơ. Trọng tâm phải là phát triển nhân lực, chuyển đổi số và công nghiệp hóa nông nghiệp." },
                            { q: "Nội dung nào có vai trò đặc biệt quan trọng trong quá trình thực hiện công nghiệp hoá, hiện đại hoá ở Việt Nam để thích ứng với tác động của cuộc Cách mạng công nghiệp thứ tư?", a: ["Phát triển nguồn nhân lực đặc biệt là nguồn nhân lực chất lượng cao", "Thực hiện chuyển đổi số nền kinh tế và quản trị xã hội", "Xây dựng và phát triển hạ tầng kĩ thuật về công nghệ thông tin và truyền thông", "Đẩy mạnh công nghiệp hoá, hiện đại hoá nông nghiệp, nông thôn"], c: 0, r: "Trong nền kinh tế tri thức và công nghệ số, chất xám con người là tài nguyên vô giá. Phát triển nguồn nhân lực chất lượng cao là khâu đột phá đặc biệt quan trọng." },
                            { q: "Một trong những giải pháp cơ bản nước ta cần thực hiện để nâng cao trình độ đào tạo, sử dụng nhân lực, nhân tài là", a: ["đổi mới mạnh mẽ và đồng bộ lĩnh vực giáo dục – đào tạo theo hướng coi trọng chất lượng, hiệu quả và coi trọng trang bị nội dung kiến thức cho người học", "quy hoạch lại mạng lưới cơ sở giáo dục nghề nghiệp, giáo dục đại học gắn với quy hoạch phát triển kinh tế – xã hội và phát triển nguồn nhân lực.", "thắt chặt đầu tư cho phát triển nguồn nhân lực đặc biệt là đầu tư cho lĩnh vực giáo dục – đào tạo.", "tổ chức nghiên cứu khoa học và đào tạo phải thay đổi cơ bản phương thức hoạt động, tách rời giữa nghiên cứu, đào tạo với doanh nghiệp."], c: 1, r: "Giáo dục và đào tạo phải bám sát thực tiễn. Việc quy hoạch lại mạng lưới giáo dục gắn liền với quy hoạch phát triển kinh tế sẽ giúp hạn chế tình trạng thừa thầy thiếu thợ." },
                            { q: "Nội dung nào dưới đây không phải là giải pháp cơ bản nước ta cần thực hiện để nâng cao trình độ đào tạo, sử dụng nhân lực, nhân tài?", a: ["Đổi mới mạnh mẽ và đồng bộ lĩnh vực giáo dục – đào tạo theo hướng coi trọng chất lượng, hiệu quả và coi trọng phát triển phẩm chất, năng lực của người học", "Quy hoạch lại mạng lưới cơ sở giáo dục nghề nghiệp, giáo dục đại học gắn với quy hoạch phát triển kinh tế – xã hội và phát triển nguồn nhân lực", "Tăng cường đầu tư cho phát triển nguồn nhân lực, trực tiếp nhất là đầu tư cho lĩnh vực giáo dục – đào tạo", "Tổ chức nghiên cứu khoa học và đào tạo phải thay đổi cơ bản phương thức hoạt động, tách rời giữa nghiên cứu, đào tạo với doanh nghiệp"], c: 3, r: "Nghiên cứu khoa học và đào tạo phải gắn kết hữu cơ với doanh nghiệp mới tạo ra sản phẩm thực tiễn. Chủ trương 'tách rời' là hoàn toàn sai lầm." },
                            { q: "Điền từ ngữ thích hợp vào chỗ chấm: Hội nhập kinh tế quốc tế của một quốc gia là quá trình quốc gia đó thực hiện ...(1)... nền kinh tế của mình với nền kinh tế thế giới dựa trên sự ...(2)... lợi ích, đồng thời tuân thủ các ...(3)... quốc tế chung.", a: ["(1) gắn kết, (2) chia sẻ, (3) chuẩn mực", "(1) hoà nhập, (2) hợp nhất, (3) chuẩn mực", "(1) gắn kết, (2) hợp nhất, (3) chuẩn mực", "(1) hoà nhập, (2) chia sẻ, (3) chuẩn mực"], c: 0, r: "Hội nhập là quá trình một quốc gia 'gắn kết' vào nền kinh tế toàn cầu, trên cơ sở 'chia sẻ' lợi ích và cùng nhau tuân thủ các 'chuẩn mực' chung của luật pháp quốc tế." },
                            { q: "Toàn cầu hoá trên phương diện nào dưới đây là xu thế nổi trội nhất, vừa là trung tâm vừa là cơ sở và cũng là động lực thúc đẩy toàn cầu hoá các lĩnh vực khác?", a: ["Văn hoá", "Xã hội", "Chính trị", "Kinh tế"], c: 3, r: "Kinh tế là nền tảng vật chất của xã hội. Sự hội nhập kinh tế chính là động lực trung tâm kéo theo sự toàn cầu hóa về văn hóa, xã hội và chính trị." },
                            { q: "Tác động tích cực của hội nhập kinh tế quốc tế đối với nước ta là", a: ["mở rộng thị trường, tiếp thu khoa học – công nghệ, vốn, chuyển dịch cơ cấu kinh tế trong nước; tạo cơ hội để nâng cao chất lượng nguồn nhân lực; thúc đẩy hội nhập của các lĩnh vực khác.", "tạo cơ hội để nâng cao chất lượng nguồn nhân lực; thúc đẩy hội nhập của các lĩnh vực; có thể làm gia tăng sự phụ thuộc của nền kinh tế quốc gia vào thị trường bên ngoài.", "mở rộng thị trường, tiếp thu khoa học – công nghệ, vốn, chuyển dịch cơ cấu kinh tế trong nước; làm gia tăng sự cạnh tranh gay gắt khiến nhiều doanh nghiệp và ngành kinh tế gặp khó khăn.", "mở rộng thị trường, tiếp thu khoa học – công nghệ, vốn, chuyển dịch cơ cấu kinh tế trong nước; có thể phân phối không công bằng, có nguy cơ làm tăng khoảng cách giàu – nghèo và bất bình đẳng xã hội."], c: 0, r: "Phương án A tổng hợp trọn vẹn những mặt tích cực. Các phương án B, C, D đều bị trộn lẫn với những khuyết điểm, thách thức của quá trình hội nhập." },
                            { q: "Một trong những tác động tiêu cực của hội nhập kinh tế quốc tế đối với nước ta là", a: ["tạo cơ hội để nâng cao chất lượng nguồn nhân lực.", "tạo điều kiện để thúc đẩy hội nhập của các lĩnh vực văn hoá, chính trị, củng cố an ninh, quốc phòng.", "mở rộng thị trường, tiếp thu khoa học – công nghệ, vốn, chuyển dịch cơ cấu kinh tế trong nước.", "làm gia tăng sự phụ thuộc của nền kinh tế quốc gia vào thị trường bên ngoài."], c: 3, r: "Khi mở cửa sâu rộng, nền kinh tế dễ bị tổn thương bởi các cú sốc bên ngoài, dẫn tới hệ quả tiêu cực là gia tăng sự phụ thuộc vào sự biến động của thị trường thế giới." },
                            { q: "Nội dung nào dưới đây không phải là tác động tích cực của hội nhập kinh tế quốc tế?", a: ["Tạo điều kiện mở rộng thị trường, tiếp thu khoa học – công nghệ, vốn, chuyển dịch cơ cấu kinh tế trong nước", "Làm gia tăng sự cạnh tranh gay gắt khiến nhiều doanh nghiệp và ngành kinh tế gặp khó khăn", "Tạo điều kiện để thúc đẩy hội nhập của các lĩnh vực văn hoá, chính trị, củng cố an ninh quốc phòng", "Tạo cơ hội để nâng cao chất lượng nguồn nhân lực"], c: 1, r: "Sự cạnh tranh khốc liệt dẫn đến việc nhiều doanh nghiệp yếu kém trong nước bị đào thải, phá sản là một 'thách thức' (tác động tiêu cực) chứ không phải mặt tích cực." },
                            { q: "Nội dung nào dưới đây không phải là tác động tiêu cực của hội nhập kinh tế quốc tế?", a: ["Làm gia tăng cạnh tranh gay gắt khiến nhiều doanh nghiệp và ngành kinh tế nước ta gặp khó khăn trong phát triển, thậm chí phá sản", "Làm gia tăng sự phụ thuộc của nền kinh tế quốc gia vào thị trường bên ngoài", "Tạo điều kiện để thúc đẩy hội nhập của các lĩnh vực văn hoá, chính trị, củng cố an ninh – quốc phòng", "Có thể tạo ra một số thách thức với quyền lực nhà nước, chủ quyền quốc gia"], c: 2, r: "Việc củng cố an ninh quốc phòng và mở rộng hội nhập văn hóa, chính trị mang lại vị thế lớn cho quốc gia, do đó nó là cơ hội và tác động tích cực." },
                            { q: "Việt Nam gia nhập Hiệp hội các quốc gia Đông Nam Á (ASEAN) vào năm nào?", a: ["1995", "1996", "1997", "1998"], c: 0, r: "Việt Nam chính thức gia nhập và trở thành thành viên thứ 7 của Hiệp hội các quốc gia Đông Nam Á (ASEAN) vào ngày 28 tháng 7 năm 1995." },
                            { q: "Việt Nam tham gia Khu vực Thương mại tự do ASEAN (AFTA) vào năm nào?", a: ["1995", "1996", "1997", "1998"], c: 0, r: "Cùng trong năm 1995, sau khi gia nhập ASEAN, Việt Nam đã ký hiệp định gia nhập Khu vực mậu dịch tự do ASEAN (AFTA)." },
                            { q: "Việt Nam chính thức trở thành thành viên của Tổ chức Thương mại Thế giới (WTO) vào năm", a: ["2004.", "2005.", "2006.", "2007."], c: 3, r: "Sau quá trình đàm phán kéo dài, Việt Nam chính thức trở thành thành viên thứ 150 của Tổ chức Thương mại Thế giới (WTO) vào tháng 1 năm 2007." },
                            { q: "Nội dung “Xây dựng nền kinh tế tự chủ phải trên cơ sở làm chủ công nghệ và chủ động, tích cực hội nhập, đa dạng hoá thị trường, nâng cao khả năng thích ứng của nền kinh tế” được Đảng ta nêu rõ trong văn kiện nào?", a: ["Chiến lược phát triển kinh tế – xã hội 1991 – 2000", "Chiến lược phát triển kinh tế – xã hội 2001 – 2010", "Chiến lược phát triển kinh tế – xã hội 2011 – 2020", "Chiến lược phát triển kinh tế – xã hội 2021 – 2030"], c: 3, r: "Đây là định hướng chiến lược mang tính cập nhật rất mới được nêu rõ trong Văn kiện Đại hội XIII của Đảng (áp dụng cho giai đoạn 2021 - 2030)." },
                            { q: "Hội nhập kinh tế quốc tế mang tính tất yếu khách quan vì", a: ["hội nhập kinh tế quốc tế là phương thức phát triển phổ biến của các nước.", "hội nhập kinh tế quốc tế là xu hướng phát triển riêng của các nước lớn trên thế giới.", "hội nhập kinh tế quốc tế góp phần hạn chế chủ quyền quốc gia của các nước kém phát triển.", "hội nhập kinh tế quốc tế không phải là con đường giúp các nước kém phát triển khắc phục sự tụt hậu."], c: 0, r: "Trong thế giới phẳng, không một quốc gia nào có thể đóng cửa tự phát triển. Hội nhập đã trở thành xu thế và phương thức phát triển phổ biến của mọi nền kinh tế." },
                            { q: "Nhận định nào dưới đây không đúng khi nói về hội nhập kinh tế quốc tế?", a: ["Hội nhập kinh tế quốc tế là phương thức phát triển phổ biến của các nước.", "Hội nhập kinh tế quốc tế là xu hướng phát triển riêng của các nước lớn trên thế giới.", "Hội nhập kinh tế quốc tế tạo ra cơ hội để các quốc gia giải quyết những vấn đề toàn cầu đã và đang xuất hiện ngày càng nhiều.", "Hội nhập kinh tế quốc tế là con đường có thể giúp cho các nước đang và kém phát triển thu hẹp khoảng cách với các nước tiên tiến."], c: 1, r: "Hội nhập là xu hướng tất yếu của TẤT CẢ các nước (kể cả nước lớn hay nước nhỏ), do đó nói nó là 'xu hướng riêng của các nước lớn' là sai lầm." },
                            { q: "Đối với các nước đang và kém phát triển thì hội nhập kinh tế quốc tế càng trở nên cần thiết, vì hội nhập kinh tế quốc tế", a: ["là cơ hội để các nước này tiếp cận và sử dụng được các nguồn lực bên ngoài như tài chính, khoa học – công nghệ, kinh nghiệm của các nước cho phát triển.", "có thể làm gia tăng sự phụ thuộc của nền kinh tế quốc gia vào thị trường bên ngoài.", "tạo ra khoảng cách ngày càng xa giữa các nước phát triển với các nước đang và kém phát triển.", "tạo điều kiện để các nước này tranh thủ nguồn việc trợ từ các nước phát triển trên thế giới."], c: 0, r: "Với các nước nghèo, hội nhập là đòn bẩy thiết yếu để thu hút vốn FDI, tiếp thu trình độ quản trị và công nghệ tiên tiến nhằm kết hợp nội lực và ngoại lực để phát triển." },
                            { q: "Khẳng định nào dưới đây là đúng khi nói về hội nhập kinh tế quốc tế?", a: ["Chỉ những nước phát triển mới đủ điều kiện tham gia hội nhập kinh tế quốc tế.", "Các nước đang và kém phát triển không nên tham gia hội nhập kinh tế quốc tế.", "Hội nhập kinh tế quốc tế là xu hướng chung của tất cả các nước trên thế giới.", "Hội nhập kinh tế quốc tế là xu hướng riêng của các nước đang và kém phát triển."], c: 2, r: "Hội nhập là dòng chảy khách quan, là xu hướng chung không thể đảo ngược của toàn bộ nền kinh tế thế giới." },
                            { q: "Nội dung của hội nhập kinh tế quốc tế ở nước ta là", a: ["chuẩn bị các điều kiện để thực hiện hội nhập hiệu quả, thành công và thực hiện đa dạng các hình thức, các mức độ hội nhập.", "chuẩn bị các điều kiện để thực hiện hội nhập hiệu quả, thành công và thực hiện đa dạng các hình thức, các mức độ hội nhập kinh tế quốc tế.", "đa phương hoá các quan hệ đối ngoại và thực hiện các hình thức, các mức độ hội nhập kinh tế quốc tế.", "thực hiện các hình thức, các mức độ hội nhập kinh tế quốc tế và phát huy nội lực."], c: 1, r: "Theo giáo trình, tiến trình này gồm 2 mảng chính: Chuẩn bị tốt các điều kiện bên trong (thể chế, cơ sở vật chất) và triển khai thực hiện đa dạng các hình thức, mức độ hội nhập bên ngoài." },
                            { q: "Tiến trình hội nhập kinh tế quốc tế được chia thành các mức độ cơ bản từ thấp đến cao là", a: ["Thoả thuận thương mại ưu đãi (PTA), Khu vực mậu dịch tự do (FTA), Liên minh thuế quan (CU), Thị trường chung (hay thị trường duy nhất), Liên minh kinh tế – tiền tệ,...", "Khu vực mậu dịch tự do (FTA), Thoả thuận thương mại ưu đãi (PTA), Liên minh thuế quan (CU), Thị trường chung (hay thị trường duy nhất), Liên minh kinh tế – tiền tệ,...", "Liên minh thuế quan (CU), Thoả thuận thương mại ưu đãi (PTA), Khu vực mậu dịch tự do (FTA), Thị trường chung (hay thị trường duy nhất), Liên minh kinh tế – tiền tệ,...", "Khu vực mậu dịch tự do (FTA), Liên minh thuế quan (CU), Thị trường chung (hay thị trường duy nhất), Thoả thuận thương mại ưu đãi (PTA), Liên minh kinh tế – tiền tệ,..."], c: 0, r: "Mức độ liên kết quốc tế tăng dần theo thứ tự: Ưu đãi thuế quan (PTA) -> Mậu dịch tự do (FTA) -> Liên minh thuế quan (CU) -> Thị trường chung (Common Market) -> Liên minh kinh tế - tiền tệ." },
                            { q: "Nội dung nào dưới đây không phải là biện pháp mà nước ta cần thực hiện để xây dựng thành công nền kinh tế độc lập, tự chủ đi đôi với tích cực và chủ động hội nhập kinh tế quốc tế?", a: ["Hoàn thiện, bổ sung đường lối chung và đường lối kinh tế, xây dựng và phát triển đất nước", "Tăng cường mối quan hệ hợp tác với các nước phát triển trên thế giới bằng mọi giá", "Đẩy mạnh quan hệ kinh tế đối ngoại và chủ động hội nhập kinh tế quốc tế", "Tăng cường năng lực cạnh tranh của nền kinh tế bằng đổi mới, hoàn thiện thể chế kinh tế, hành chính"], c: 1, r: "Hội nhập phải dựa trên sự bình đẳng, bảo đảm độc lập tự chủ. Việc vội vã 'hợp tác bằng mọi giá' sẽ dẫn tới nhượng bộ, mất chủ quyền và lệ thuộc kinh tế." },
                            { q: "Chủ thể nào sẽ được đặt vào vị trí trung tâm trong tiến trình hội nhập kinh tế quốc tế của nước ta?", a: ["Nhà nước", "Người dân", "Đội ngũ trí thức", "Doanh nghiệp"], c: 3, r: "Trong sân chơi toàn cầu, Doanh nghiệp chính là những người lính trực tiếp chiến đấu trên mặt trận kinh tế, nên họ phải được đặt vào vị trí trung tâm của tiến trình hội nhập." },
                            { q: "Trong hội nhập quốc tế toàn diện, chủ thể nào được xem là lực lượng nòng cốt?", a: ["Nhà nước", "Người dân", "Doanh nghiệp và đội ngũ doanh nhân", "Doanh nghiệp và đội ngũ trí thức"], c: 2, r: "Lực lượng trực tiếp tạo ra của cải, việc làm và nâng cao năng lực cạnh tranh quốc gia không ai khác chính là khối các doanh nghiệp và đội ngũ doanh nhân." },
                            { q: "Điền từ ngữ thích hợp vào chỗ chấm: Nền kinh tế độc lập, tự chủ là nền kinh tế không bị ...(1)..., phụ thuộc vào nước khác, người khác hoặc vào một tổ chức kinh tế nào đó về đường lối, chính sách phát triển, không bị bất cứ ai dùng những điều kiện kinh tế, tài chính, thương mại, viện trợ... để ...(2)..., khống chế làm tổn hại ...(3)... quốc gia và ...(4)... cơ bản của dân tộc.", a: ["(1) khống chế; (2) áp đặt; (3) lợi ích; (4) chủ quyền", "(1) lệ thuộc; (2) chi phối; (3) chủ quyền; (4) lợi ích", "(1) lệ thuộc; (2) áp đặt; (3) chủ quyền; (4) lợi ích", "(1) khống chế; (2) chi phối; (3) lợi ích; (4) chủ quyền"], c: 1, r: "Khái niệm chuẩn: nền kinh tế không bị 'lệ thuộc', không bị dùng điều kiện để 'chi phối', không làm tổn hại 'chủ quyền' và 'lợi ích' cơ bản của dân tộc." },
                            { q: "Nhiệm vụ nào được coi là nhiệm vụ trọng tâm nhằm xây dựng nền kinh tế độc lập, tự chủ, xây dựng cơ sở vật chất cho chủ nghĩa xã hội, giúp Việt Nam đi tắt, đón đầu, tránh nguy cơ tụt hậu xa hơn về kinh tế so với các nước khác?", a: ["Đẩy mạnh quan hệ kinh tế đối ngoại và chủ động hội nhập kinh tế quốc tế", "Đẩy mạnh công nghiệp hoá, hiện đại hoá đất nước", "Kết hợp chặt chẽ kinh tế với quốc phòng, an ninh và đối ngoại trong hội nhập quốc tế", "Đổi mới, hoàn thiện thể chế kinh tế, hành chính để tăng cường năng lực cạnh tranh của nền kinh tế"], c: 1, r: "Để xóa bỏ nghèo nàn lạc hậu và tạo ra nền tảng vật chất vững chắc cho tự chủ kinh tế, CNH-HĐH chính là nhiệm vụ trung tâm, xuyên suốt trong thời kỳ quá độ." }
                        ]
                    }
                }
            },
            law: {
                name: "Pháp Luật Đại Cương",
                color: "#2980b9",
                data: {
                    1: {
                        title: "Phần 1: Trắc nghiệm Tổng hợp Hệ thống Luật pháp Nhà nước (20 câu)",
                        questions: [
                            { q: "Chủ thể có thẩm quyền ban hành Hiến pháp là:", a: ["Hệ thống cơ quan quyền lực nhà nước (Quốc hội và HĐND các cấp).", "Hệ thống cơ quan nhà nước ở Trung ương.", "Cơ quan hành chính nhà nước cao nhất.", "Cơ quan quyền lực nhà nước cao nhất."], c: 3, r: "Quốc hội là cơ quan quyền lực nhà nước cao nhất và là chủ thể duy nhất có thẩm quyền lập hiến và lập pháp." },
                            { q: "Quy trình bắt buộc khi ban hành một Bản hiến pháp là:", a: ["Phải lấy ý kiến đóng góp của cử tri cả nước (trưng cầu ý dân).", "Phải được thông qua tại kỳ họp Quốc hội với tỷ lệ từ đủ 2/3 tổng số Đại biểu Quốc hội đồng thuận.", "Phải được Chủ tịch nước ký Lệnh công bố.", "Tất cả các phương án trên."], c: 3, r: "Quy trình lập hiến đòi hỏi sự kết hợp chặt chẽ của việc trưng cầu ý dân, thông qua đa số tuyệt đối (2/3) tại Quốc hội và Chủ tịch nước công bố." },
                            { q: "Để thực hiện cơ chế Bảo hiến các quốc gia thường thành lập cơ quan nào?", a: ["Tòa án bảo hiến.", "Hội đồng bảo hiến.", "Ủy ban bảo hiến.", "Một trong các phương án A, B, C."], c: 3, r: "Tùy thuộc vào mô hình thể chế, cơ chế bảo vệ hiến pháp có thể do Tòa án bảo hiến hoặc Hội đồng/Ủy ban bảo hiến đảm nhiệm." },
                            { q: "Bản Hiến pháp sơ lược đầu tiên của lịch sử thế giới được xác định là bản Hiến pháp nào?", a: ["Hiến pháp nước Anh năm 1640.", "Hiến pháp Liên bang Mỹ năm 1787.", "Hiến pháp Cộng hòa Pháp năm 1789.", "Hiến pháp Xô viết Nga năm 1918."], c: 1, r: "Hiến pháp Liên bang Mỹ năm 1787 được ghi nhận là bản Hiến pháp thành văn đầu tiên trên thế giới." },
                            { q: "Tư tưởng Lập hiến đầu tiên ở Việt Nam được xác định là tư tưởng của ai?", a: ["Phan Chu Trinh.", "Phan Bội Châu.", "Nguyễn Ái Quốc.", "Võ Nguyên Giáp."], c: 2, r: "Lãnh tụ Nguyễn Ái Quốc là người đặt nền móng và đưa tư tưởng lập hiến vào phong trào yêu nước Việt Nam từ rất sớm." },
                            { q: "Câu nói: 'Bảy xin Hiến pháp ban hành, trăm điều phải có thần linh pháp quyền' đã được Nguyễn Ái Quốc nêu ra trong sự kiện lịch sử nào?", a: ["Luận cương thành lập Đảng Cộng sản Việt Nam.", "Trong bài viết 'Cách mệnh'.", "Trong Hội nghị Versailles, tổ chức tại Pari - Pháp năm 1919.", "Trong Tuyên ngôn độc lập năm 1945."], c: 2, r: "Câu nói nổi tiếng này nằm trong Bản yêu sách của nhân dân An Nam do Nguyễn Ái Quốc gửi đến Hội nghị Versailles năm 1919." },
                            { q: "Bản Hiến pháp Việt Nam năm 1946 được ban hành vào ngày nào?", a: ["Ngày 9/11/1945.", "Ngày 9/11/1946.", "Ngày 6/1/1945.", "Ngày 6/1/1946."], c: 1, r: "Bản Hiến pháp đầu tiên của nước Việt Nam Dân chủ Cộng hòa được Quốc hội thông qua vào ngày 9 tháng 11 năm 1946." },
                            { q: "Bản Hiến pháp năm 1946 có bao nhiêu chương, bao nhiêu điều?", a: ["10 chương 120 điều.", "8 chương 100 điều.", "7 chương 90 điều.", "7 chương 70 điều."], c: 3, r: "Hiến pháp năm 1946 có kết cấu ngắn gọn gồm 7 chương và 70 điều." },
                            { q: "Theo Hiến pháp năm 1946, người đứng đầu Chính phủ được xác định là:", a: ["Thủ tướng Chính phủ.", "Hội đồng Bộ trưởng.", "Chủ tịch nước.", "Ủy ban Nhà nước."], c: 2, r: "Theo cơ chế Hiến pháp 1946, Chủ tịch nước đồng thời giữ vị trí đứng đầu Chính phủ sinh hoạt hành pháp." },
                            { q: "Hệ thống Tòa án của Việt Nam theo Hiến pháp năm 1946 được tổ chức theo cấp nào?", a: ["Cấp hành chính - lãnh thổ.", "Cấp xét xử.", "Cấp thẩm vấn.", "Cấp tranh tụng."], c: 0, r: "Hệ thống cơ quan tư pháp lúc bấy giờ được phân định gắn liền theo địa hạt phân cấp hành chính - lãnh thổ quốc gia." },
                            { q: "Theo Hiến pháp năm 1980, người đứng đầu bộ máy nhà nước Việt Nam được xác định là:", a: ["Chủ tịch nước (chế định cá nhân độc lập).", "Hội đồng Bộ trưởng.", "Hội đồng Nhà nước (Chủ tịch nước tập thể).", "Không có đáp án nào đúng."], c: 2, r: "Hiến pháp 1980 quy định Hội đồng Nhà nước là chủ tịch nước tập thể của Cộng hòa xã hội chủ nghĩa Việt Nam." },
                            { q: "Trong Hệ thống chính trị XHCN Việt Nam, Mặt trận Tổ quốc được xác định là:", a: ["Một tổ chức chính trị đặc biệt.", "Một tổ chức đặc biệt của quyền lực chính trị.", "Một tổ chức chính trị - xã hội.", "Một tổ chức xã hội tự quản."], c: 2, r: "Mặt trận Tổ quốc Việt Nam là tổ chức chính trị - xã hội, là liên minh chính trị của các tổ chức và cá nhân tiêu biểu." },
                            { q: "Bộ luật hình sự đầu tiên của Việt Nam là:", a: ["Bộ luật hình sự 1985.", "Bộ luật hình sự 1987.", "Bộ luật hình sự 1999.", "Bộ luật hình sự 2001."], c: 0, r: "Bộ luật hình sự đầu tiên của nước ta được Quốc hội thông qua và ban hành vào năm 1985." },
                            { q: "Hình thức chính thể của nhà nước Việt Nam là:", a: ["Cộng hòa Nghị viện nhân dân.", "Cộng hòa hỗn hợp.", "Cộng hòa dân chủ nhân dân.", "Cộng hòa xã hội chủ nghĩa."], c: 3, r: "Điều 1 Hiến pháp khẳng định nước ta tổ chức theo hình thức chính thể Cộng hòa xã hội chủ nghĩa." },
