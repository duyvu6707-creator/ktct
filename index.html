                    osc.frequency.setValueAtTime(600, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(1000, ctx.currentTime + 0.04);
                    gain.gain.setValueAtTime(0.04, ctx.currentTime);

                updateMascot('idle', 'Chào bạn! Hãy chọn một chương lý thuyết bất kỳ bên dưới để ôn luyện nhé!');
            } else if (view === 'study') {
                updateMascot('thinking', 'Đề bài chương này có khá nhiều bẫy từ ngữ đấy! Hãy đọc thật chậm và kỹ nhé.');
            } else if (view === 'flashcard') {
                updateMascot('thinking', 'Chế độ flashcard giúp bạn ghi nhớ cực nhanh qua các gợi ý cốt lõi.');
            } else if (view === 'exam') {
                updateMascot('exam', 'Bài thi thử gồm 40 câu ngẫu nhiên. Tập trung cao độ, tắt mạng xã hội và làm nhé!');
            } else if (view === 'search') {
                updateMascot('thinking', 'Nhập từ khóa bất kỳ, mình sẽ tìm ngay đáp án gốc chính thức cho bạn.');
            } else if (view === 'stats') {
                updateMascot('idle', 'Hãy xem lại biểu đồ thống kê mức độ hoàn thiện kiến thức của bạn.');
            } else if (view === 'wrong-review') {
                updateMascot('incorrect', 'Đây là các câu bạn đã trả lời chưa đúng. Hãy xem lại thật cẩn thận.');
            } else if (view === 'bookmark-review') {
                updateMascot('correct', 'Các câu hỏi trọng tâm bạn đã lưu trữ riêng tư.');
            }

            renderView();
        };

        // BOOKMARK SYSTEM
        const toggleBookmark = (ch, id) => {
            const question = state.questions.find(q => q.ch === ch && q.id === id);
            const index = state.bookmarks.findIndex(b => b.ch === ch && b.id === id);
            
            synthSound('click');
            if (index !== -1) {
                state.bookmarks.splice(index, 1);
            } else {
                state.bookmarks.push(question);
            }
            renderView();
        };

        const isBookmarked = (ch, id) => {
            return state.bookmarks.some(b => b.ch === ch && b.id === id);
        };

        // HOME DASHBOARD RENDERER
        const renderHome = () => {
            const correctTotal = Object.values(state.statsData).reduce((a, b) => a + b, 0);
            
            let chaptersHTML = '';
            chapters.forEach(ch => {
                const progressVal = state.statsData[ch.id] || 0;
                const progressPercentage = Math.round((progressVal / ch.count) * 100);

                chaptersHTML += `
                    <div class="bg-white border border-slate-150/70 rounded-2xl p-5 shadow-xs space-y-3.5 transition hover:shadow-sm">
                        <div class="space-y-1">
                            <span class="text-[9px] font-extrabold text-indigo-600 bg-indigo-50/50 px-2 py-0.5 rounded-md uppercase tracking-widest">
                                Chương ${ch.id}
                            </span>
                            <h3 class="text-sm font-bold text-slate-800 leading-snug">
                                ${ch.title.split(': ')[1]}
                            </h3>
                            <span class="inline-block text-[10px] text-slate-400 font-bold">
                                Ngân hàng: ${ch.count} câu hỏi
                            </span>
                        </div>

                        <div class="space-y-1 pt-1">
                            <div class="flex justify-between text-[9px] font-bold text-slate-400 uppercase tracking-wider">
                                <span>Tỷ lệ thuộc bài</span>
                                <span>${progressVal}/${ch.count} (${progressPercentage}%)</span>
                            </div>
                            <div class="w-full bg-slate-100 h-1 rounded-full overflow-hidden">
                                <div class="bg-indigo-600 h-1 rounded-full transition-all duration-300" style="width: ${progressPercentage}%"></div>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-2.5 pt-1">
                            <button onclick="startChapterStudy(${ch.id})" class="py-2 px-3 text-center bg-indigo-50 hover:bg-indigo-100 active:scale-[0.98] text-indigo-600 text-xs font-bold rounded-xl transition">
                                Luyện tập
                            </button>
                            <button onclick="startChapterFlashcard(${ch.id})" class="py-2 px-3 text-center bg-slate-50 hover:bg-slate-100 active:scale-[0.98] text-slate-600 text-xs font-bold rounded-xl transition">
                                Thẻ ghi nhớ
                            </button>
                        </div>
                    </div>
                `;
            });

            return `
                <div class="space-y-6 animate-fadeIn">
                    <div class="bg-white border border-slate-100 rounded-3xl p-6 shadow-sm space-y-4 relative overflow-hidden">
                        <span class="text-[9px] font-bold text-indigo-600 bg-indigo-50 px-2.5 py-1 rounded-md uppercase tracking-widest">
                            Nền tảng Ôn thi Đại Học
                        </span>
                        <h1 class="text-xl font-black tracking-tight text-slate-800 leading-tight">
                            Ôn Tập Kinh Tế Chính Trị <br/>Mác - Lênin
                        </h1>
                        <p class="text-xs text-slate-500 leading-relaxed font-medium">
                            Hệ thống tối giản hỗ trợ ôn tập toàn bộ 453 câu trắc nghiệm chính quy theo chương trình đổi mới.
                        </p>
                        
                        <div class="pt-4 border-t border-slate-50 grid grid-cols-3 gap-2 text-center">
                            <div class="bg-slate-50/50 p-2.5 rounded-2xl">
                                <div class="text-lg font-black text-slate-800">${state.questions.length}</div>
                                <div class="text-[9px] text-slate-400 font-bold uppercase tracking-wider">Tổng số câu</div>
                            </div>
                            <div class="bg-indigo-50/50 p-2.5 rounded-2xl">
                                <div class="text-lg font-black text-indigo-600">${correctTotal}</div>
                                <div class="text-[9px] text-indigo-400 font-bold uppercase tracking-wider">Đúng tích luỹ</div>
                            </div>
                            <div class="bg-emerald-50/50 p-2.5 rounded-2xl">
                                <div class="text-lg font-black text-emerald-600">${state.bookmarks.length}</div>
                                <div class="text-[9px] text-emerald-400 font-bold uppercase tracking-wider">Đã lưu</div>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="startExam()" class="bg-gradient-to-br from-indigo-600 to-indigo-700 text-white p-4 rounded-2xl shadow-sm hover:scale-[1.01] active:scale-[0.98] transition-all text-left flex flex-col justify-between h-24">
                            <span class="block font-black text-sm">Thi Thử 40 Câu</span>
                            <span class="block text-[9px] text-indigo-100 font-medium">Ngẫu nhiên • 60 phút</span>
                        </button>

                        <button onclick="viewWrongAnswers()" class="bg-white border border-slate-150 p-4 rounded-2xl shadow-xs hover:scale-[1.01] active:scale-[0.98] transition-all text-left flex flex-col justify-between h-24">
                            <span class="block font-black text-sm text-slate-800">Sửa Lỗi Sai (${state.wrongAnswers.length})</span>
                            <span class="block text-[9px] text-slate-400 font-medium">Làm lại câu đã làm sai</span>
                        </button>
                    </div>

                    <div class="flex space-x-2 overflow-x-auto pb-1 scrollbar-none">
                        <button onclick="viewBookmarks()" class="px-3.5 py-2 bg-white border border-slate-100 rounded-xl text-xs font-bold text-slate-600 hover:text-indigo-600 hover:border-indigo-200 transition whitespace-nowrap shadow-xs">
                            ⭐ Đã đánh dấu (${state.bookmarks.length})
                        </button>
                        <button onclick="changeView('stats')" class="px-3.5 py-2 bg-white border border-slate-100 rounded-xl text-xs font-bold text-slate-600 hover:text-indigo-600 hover:border-indigo-200 transition whitespace-nowrap shadow-xs">
                            📊 Thống kê tiến độ
                        </button>
                        <button onclick="changeView('search')" class="px-3.5 py-2 bg-white border border-slate-100 rounded-xl text-xs font-bold text-slate-600 hover:text-indigo-600 hover:border-indigo-200 transition whitespace-nowrap shadow-xs">
                            🔍 Tìm câu hỏi nhanh
                        </button>
                    </div>

                    <div class="space-y-3">
                        <h2 class="text-[10px] font-extrabold text-slate-400 tracking-widest uppercase">
                          Luyện tập có trọng tâm
                        </h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            ${chaptersHTML}
                        </div>
                    </div>
                </div>
            `;
        };

        const startChapterStudy = (chId) => {
            state.selectedChapter = chId;
            state.currentQuestionIndex = 0;
            state.selectedOption = null;
            state.isAnswered = false;
            state.score = 0;
            changeView('study');
        };

        const startChapterFlashcard = (chId) => {
            state.selectedChapter = chId;
            state.currentQuestionIndex = 0;
            state.flashcardFlipped = false;
            changeView('flashcard');
        };

        const viewWrongAnswers = () => {
            if (state.wrongAnswers.length === 0) {
                showModal("Thông báo", "Bạn chưa có câu trả lời sai nào được hệ thống ghi nhận.");
                return;
            }
            changeView('wrong-review');
        };

        const viewBookmarks = () => {
            if (state.bookmarks.length === 0) {
                showModal("Thông báo", "Hiện tại bạn chưa đánh dấu lưu trữ câu hỏi nào.");
                return;
            }
            changeView('bookmark-review');
        };

        // STUDY (QUIZ MODE) RENDERER - ZEN MODE READY
        const renderStudy = () => {
            const chQuestions = state.questions.filter(q => q.ch === state.selectedChapter);
            const currentQ = chQuestions[state.currentQuestionIndex];
            const isBookmarkedVal = isBookmarked(currentQ.ch, currentQ.id);

            let optionsHTML = '';
            currentQ.o.forEach((opt, idx) => {
                const letter = ["A", "B", "C", "D"][idx];
                let btnStyle = "border-slate-100 bg-white text-slate-700 hover:bg-slate-50 hover:border-slate-200";
                let badgeStyle = "bg-slate-100 text-slate-500";
                
                if (state.isAnswered) {
                    if (idx === currentQ.ans) {
                        btnStyle = "border-emerald-500 bg-emerald-50 text-emerald-800 font-bold";
                        badgeStyle = "bg-emerald-500 text-white";
                    } else if (idx === state.selectedOption) {
                        btnStyle = "border-rose-500 bg-rose-50/70 text-rose-800";
                        badgeStyle = "bg-rose-500 text-white";
                    } else {
                        btnStyle = "border-slate-100 bg-white text-slate-400";
                    }
                }

                optionsHTML += `
                    <button onclick="selectStudyOption(${idx})" ${state.isAnswered ? 'disabled' : ''} class="w-full p-4.5 border rounded-2xl text-left text-xs md:text-sm flex items-start space-x-3 transition-all hover:scale-[1.005] active:scale-[0.99] ${btnStyle}">
                        <span class="inline-flex items-center justify-center w-6 h-6 rounded-xl text-xs font-black shrink-0 ${badgeStyle}">
                            ${letter}
                        </span>
                        <span class="leading-relaxed font-medium pt-0.5">${opt}</span>
                    </button>
                `;
            });

            return `
                <div class="space-y-6 ${state.zenMode ? 'py-8 max-w-2xl mx-auto' : ''} animate-fadeIn">
                    
                    <!-- Zen Mode Control bar -->
                    <div class="flex items-center justify-between border-b border-slate-100 pb-3">
                        <div class="flex items-center space-x-2">
                            <!-- Zen Mode Button -->
                            <button onclick="toggleZenMode()" class="flex items-center space-x-1.5 px-3 py-1.5 rounded-full text-[10px] font-extrabold uppercase tracking-wider transition ${state.zenMode ? 'bg-indigo-600 text-white shadow-sm' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}" title="Nhấn để ẩn bớt chi tiết">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                                <span>${state.zenMode ? 'Đang Tập Trung' : 'Chế Độ Tập Trung'}</span>
                            </button>
                        </div>
                        
                        <div class="flex items-center space-x-3">
                            <span class="text-xs font-bold text-slate-400">Câu ${state.currentQuestionIndex + 1}/${chQuestions.length}</span>
                            <button onclick="toggleBookmark(${currentQ.ch}, ${currentQ.id})" class="p-1.5 text-slate-400 hover:text-yellow-500 transition rounded-lg hover:bg-slate-100" title="Đánh dấu câu này">
                                <svg class="w-5 h-5 ${isBookmarkedVal ? 'fill-yellow-400 text-yellow-400' : ''}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />
                                </svg>
                            </button>
                            <span class="text-xs font-extrabold text-emerald-600 bg-emerald-50 px-2.5 py-1 rounded-xl">Đúng: ${state.score}</span>
                        </div>
                    </div>

                    <!-- Progress indicator bar -->
                    <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                        <div class="bg-indigo-600 h-1.5 rounded-full transition-all duration-300" style="width: ${((state.currentQuestionIndex + 1) / chQuestions.length) * 100}%"></div>
                    </div>

                    <!-- Main Question Card (Ultra Focused) -->
                    <div class="bg-white border ${state.zenMode ? 'border-slate-100 shadow-sm' : 'border-slate-100'} rounded-3xl p-6 md:p-8 space-y-6">
                        <h3 class="text-base md:text-lg font-bold text-slate-800 leading-relaxed">
                            ${currentQ.q}
                        </h3>
                        <div class="space-y-3 pt-2">
                            ${optionsHTML}
                        </div>
                    </div>

                    <!-- Zen Mode exit help floating indicator -->
                    ${state.zenMode ? `
                        <div class="text-center pt-2">
                            <button onclick="toggleZenMode()" class="text-[10px] text-slate-400 hover:text-indigo-600 font-extrabold uppercase tracking-widest">
                                • Thoát Chế Độ Tập Trung •
                            </button>
                        </div>
                    ` : ''}

                    <!-- Navigation controls -->
                    <div class="flex justify-between items-center pt-1">
                        <button onclick="prevStudyQuestion()" ${state.currentQuestionIndex === 0 ? 'disabled' : ''} class="px-4 py-2.5 text-xs font-bold text-slate-400 hover:text-slate-700 disabled:opacity-30 transition">
                            ← Câu trước
                        </button>
                        <button onclick="nextStudyQuestion(${chQuestions.length})" class="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold rounded-xl active:scale-[0.98] transition shadow-md shadow-indigo-100">
                            ${state.currentQuestionIndex === chQuestions.length - 1 ? 'Hoàn thành' : 'Câu tiếp theo →'}
                        </button>
                    </div>
                </div>
            `;
        };

        const selectStudyOption = (optIdx) => {
            if (state.isAnswered) return;
            state.selectedOption = optIdx;
            state.isAnswered = true;

            const chQuestions = state.questions.filter(q => q.ch === state.selectedChapter);
            const currentQ = chQuestions[state.currentQuestionIndex];

            if (optIdx === currentQ.ans) {
                state.score++;
                synthSound('correct');
                updateMascot('correct', 'Lập luận chuẩn xác! Bạn lựa chọn hoàn toàn đúng đắn.');
                state.statsData[state.selectedChapter] = Math.min(
                    (state.statsData[state.selectedChapter] || 0) + 1, 
                    chapters.find(c => c.id === state.selectedChapter).count
                );
            } else {
                synthSound('incorrect');
                updateMascot('incorrect', 'Chưa chính xác rồi. Hãy phân tích kỹ để chọn lại ở câu sau nhé!');
                if (!state.wrongAnswers.some(wa => wa.ch === currentQ.ch && wa.id === currentQ.id)) {
                    state.wrongAnswers.push(currentQ);
                }
            }
            renderView();
        };

        const prevStudyQuestion = () => {
            if (state.currentQuestionIndex > 0) {
                state.currentQuestionIndex--;
                state.selectedOption = null;
                state.isAnswered = false;
                updateMascot('thinking', 'Tiếp tục suy luận để tìm ra đáp án đúng nhé!');
                renderView();
            }
        };

        const nextStudyQuestion = (total) => {
            if (state.currentQuestionIndex < total - 1) {
                state.currentQuestionIndex++;
                state.selectedOption = null;
                state.isAnswered = false;
                updateMascot('thinking', 'Tiếp tục nào! Tập trung đọc kỹ câu tiếp theo nhé.');
                renderView();
            } else {
                synthSound('fanfare');
                showModal("Chúc mừng!", `Bạn đã hoàn thành chương ${state.selectedChapter} với điểm số: ${state.score}/${total}.`, () => {
                    changeView('home');
                });
            }
        };

        // FLASHCARD RENDERER
        const renderFlashcard = () => {
            const chQuestions = state.questions.filter(q => q.ch === state.selectedChapter);
            const currentQ = chQuestions[state.currentQuestionIndex];
            const isBookmarkedVal = isBookmarked(currentQ.ch, currentQ.id);

            return `
                <div class="space-y-5 animate-fadeIn">
                    <div class="flex items-center justify-between border-b border-slate-100 pb-3">
                        <div>
                            <span class="text-[10px] font-extrabold text-indigo-600 block uppercase tracking-wider">Chương ${state.selectedChapter} - Thẻ Flashcard</span>
                            <span class="text-xs font-bold text-slate-400">Thẻ ${state.currentQuestionIndex + 1} / ${chQuestions.length}</span>
                        </div>
                        <button onclick="toggleBookmark(${currentQ.ch}, ${currentQ.id})" class="p-1.5 text-slate-400 hover:text-yellow-500 transition rounded-lg hover:bg-slate-100">
                            <svg class="w-5 h-5 ${isBookmarkedVal ? 'fill-yellow-400 text-yellow-400' : ''}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />
                            </svg>
                        </button>
                    </div>

                    <div onclick="flipFlashcard()" class="bg-white border border-slate-100 rounded-3xl min-h-[250px] p-6 shadow-sm hover:shadow-md hover:border-indigo-100 transition-all cursor-pointer flex flex-col justify-between items-center text-center relative overflow-hidden">
                        <div class="absolute top-3 right-3 text-[9px] font-extrabold text-slate-300 uppercase tracking-widest">
                            ${state.flashcardFlipped ? "Mặt Giải Đáp" : "Mặt Câu Hỏi"}
                        </div>

                        <div class="my-auto space-y-4 max-w-sm">
                            ${!state.flashcardFlipped ? `
                                <h3 class="text-sm font-bold text-slate-800 leading-snug">${currentQ.q}</h3>
                            ` : `
                                <div class="space-y-3 animate-fadeIn">
                                    <span class="inline-block bg-emerald-50 text-emerald-600 text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-wider">
                                        Đáp án chính xác
                                    </span>
                                    <p class="text-sm font-black text-emerald-800 leading-relaxed">
                                        ${currentQ.o[currentQ.ans]}
                                    </p>
                                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wide">
                                        Chương ${state.selectedChapter} • Câu số ${currentQ.id}
                                    </p>
                                </div>
                            `}
                        </div>

                        <span class="text-[9px] font-extrabold text-indigo-500 bg-indigo-50 px-3 py-1.5 rounded-full uppercase tracking-wider">
                            ${state.flashcardFlipped ? "Chạm để xem câu hỏi" : "Chạm để lật thẻ đáp án"}
                        </span>
                    </div>

                    <div class="flex justify-between items-center">
                        <button onclick="prevFlashcard()" ${state.currentQuestionIndex === 0 ? 'disabled' : ''} class="px-4 py-2 text-xs font-bold text-slate-400 hover:text-slate-700 disabled:opacity-30 transition">
                            ← Thẻ trước
                        </button>
                        <button onclick="nextFlashcard(${chQuestions.length})" class="px-5 py-2.5 bg-indigo-600 text-white text-xs font-bold rounded-xl hover:bg-indigo-700 active:scale-[0.98] transition">
                            ${state.currentQuestionIndex === chQuestions.length - 1 ? 'Xong' : 'Thẻ tiếp theo →'}
                        </button>
                    </div>
                </div>
            `;
        };

        const flipFlashcard = () => {
            state.flashcardFlipped = !state.flashcardFlipped;
            renderView();
        };

        const prevFlashcard = () => {
            if (state.currentQuestionIndex > 0) {
                synthSound('click');
                state.currentQuestionIndex--;
                state.flashcardFlipped = false;
                renderView();
            }
        };

        const nextFlashcard = (total) => {
            if (state.currentQuestionIndex < total - 1) {
                synthSound('click');
                state.currentQuestionIndex++;
                state.flashcardFlipped = false;
                renderView();
            } else {
                synthSound('fanfare');
                showModal("Hoàn thành!", "Bạn đã học xong toàn bộ thẻ ghi nhớ của chương này.", () => {
                    changeView('home');
                });
            }
        };

        // EXAM MODE CONTROLLER
        let examTimerInterval = null;
        const startExam = () => {
            synthSound('click');
            const shuffled = [...state.questions].sort(() => 0.5 - Math.random());
            state.examQuestions = shuffled.slice(0, 40);
            state.examAnswers = {};
            state.examSubmitted = false;
            state.examTimeLeft = 3600;
            state.examActive = true;
            
            clearInterval(examTimerInterval);
            examTimerInterval = setInterval(() => {
                if (state.examActive && state.examTimeLeft > 0) {
                    state.examTimeLeft--;
                    updateExamTimerDisplay();
                } else if (state.examTimeLeft === 0 && state.examActive) {
                    submitExam();
                }
            }, 1000);

            changeView('exam');
        };

        const updateExamTimerDisplay = () => {
            const timerSpan = document.getElementById('exam-timer');
            if (timerSpan) {
                timerSpan.innerText = formatTime(state.examTimeLeft);
            }
        };

        const selectExamOption = (qIdx, optIdx) => {
            if (state.examSubmitted) return;
            synthSound('click');
            state.examAnswers[qIdx] = optIdx;
            renderView();
        };

        const submitExam = () => {
            clearInterval(examTimerInterval);
            state.examActive = false;
            state.examSubmitted = true;
            synthSound('fanfare');

            let examScore = 0;
            state.examQuestions.forEach((q, idx) => {
                if (state.examAnswers[idx] === q.ans) {
                    examScore++;
                }
            });

            updateMascot('correct', `Hoàn thành bài thi! Kết quả đạt ${examScore}/40 câu đúng.`);
            showModal("Kết quả thi thử", `Bạn đã hoàn thành bài thi thử! Số câu đúng: ${examScore}/40 câu.`);
            renderView();
        };

        // EXAM RENDERER
        const renderExam = () => {
            let questionsListHTML = '';
            
            state.examQuestions.forEach((q, qIdx) => {
                const userChoice = state.examAnswers[qIdx];
                let optionsHTML = '';

                q.o.forEach((opt, optIdx) => {
                    let btnStyle = "border-slate-100 bg-white text-slate-700 hover:bg-slate-50";
                    let badgeStyle = "bg-slate-100 text-slate-400";
                    
                    if (state.examSubmitted) {
                        if (optIdx === q.ans) {
                            btnStyle = "border-emerald-500 bg-emerald-50 text-emerald-800 font-bold";
                            badgeStyle = "bg-emerald-500 text-white";
                          } else if (optIdx === userChoice) {
                            btnStyle = "border-rose-500 bg-rose-50 text-rose-800";
                            badgeStyle = "bg-rose-500 text-white";
                          } else {
                            btnStyle = "border-slate-100 text-slate-400";
                          }
                    } else if (userChoice === optIdx) {
                        btnStyle = "border-indigo-500 bg-indigo-50 text-indigo-800 font-semibold";
                        badgeStyle = "bg-indigo-600 text-white";
                    }

                    optionsHTML += `
                        <button ${state.examSubmitted ? 'disabled' : ''} onclick="selectExamOption(${qIdx}, ${optIdx})" class="p-3.5 border rounded-xl text-left text-xs flex items-center space-x-2 transition-all ${btnStyle}">
                            <span class="inline-flex items-center justify-center w-5 h-5 rounded text-[10px] font-black ${badgeStyle}">
                                ${["A", "B", "C", "D"][optIdx]}
                            </span>
                            <span class="leading-tight font-medium">${opt}</span>
                        </button>
                    `;
                });

                questionsListHTML += `
                    <div class="bg-white border border-slate-100 rounded-2xl p-4 shadow-sm space-y-3">
                        <div class="flex justify-between items-center">
                            <span class="text-[10px] font-extrabold text-indigo-600 bg-indigo-50 px-2.5 py-1 rounded-lg uppercase tracking-wider">
                                Câu ${qIdx + 1}
                            </span>
                            <span class="text-[9px] font-bold text-slate-400 uppercase">Chương ${q.ch}</span>
                        </div>
                        <h4 class="text-xs font-bold text-slate-800 leading-tight">
                            ${q.q}
                        </h4>
                        <div class="grid grid-cols-1 gap-2 pt-1">
                            ${optionsHTML}
                        </div>
                    </div>
                `;
            });

            return `
                <div class="space-y-6 animate-fadeIn">
                    <div class="bg-white border border-slate-100 rounded-2xl p-4 flex justify-between items-center shadow-xs">
                        <div>
                            <span class="text-[10px] font-extrabold text-indigo-600 block uppercase tracking-wider">Mô phỏng kỳ thi chính thức</span>
                            <span class="text-xs font-bold text-slate-400">Gồm 40 câu ngẫu nhiên</span>
                        </div>
                        <div class="text-right">
                            <span id="exam-timer" class="text-sm font-mono font-black text-indigo-600 block">
                                ${formatTime(state.examTimeLeft)}
                            </span>
                            <span class="text-[8px] text-slate-400 uppercase font-extrabold tracking-widest">Thời gian</span>
                        </div>
                    </div>

                    <div class="space-y-4">
                        ${questionsListHTML}
                    </div>

                    ${!state.examSubmitted ? `
                        <button onclick="submitExam()" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-2xl shadow-lg active:scale-[0.98] transition">
                            Nộp Bài Thi Ngay
                        </button>
                    ` : `
                        <button onclick="changeView('home')" class="w-full py-4 bg-slate-800 hover:bg-slate-900 text-white font-bold rounded-2xl shadow-md active:scale-[0.98] transition">
                            Về Trang Chủ
                        </button>
                    `}
                </div>
            `;
        };

        // SEARCH ENGINE RENDERER
        const renderSearch = () => {
            let resultsHTML = '';
            const searchVal = state.searchQuery.trim().toLowerCase();
            
            if (searchVal) {
                const filtered = state.questions.filter(q => 
                    q.q.toLowerCase().includes(searchVal) ||
                    q.o.some(opt => opt.toLowerCase().includes(searchVal))
                );

                if (filtered.length > 0) {
                    filtered.forEach((q, idx) => {
                        resultsHTML += `
                            <div class="bg-white border border-slate-100 rounded-2xl p-4 shadow-sm space-y-2 animate-fadeIn">
                                <div class="flex justify-between text-[9px] text-slate-400 font-extrabold uppercase">
                                    <span>CHƯƠNG ${q.ch} • CÂU ${q.id}</span>
                                    <span class="text-indigo-600">Đáp án: ${["A", "B", "C", "D"][q.ans]}</span>
                                </div>
                                <h3 class="text-xs font-bold text-slate-800 leading-snug">${q.q}</h3>
                                <div class="text-[11px] text-slate-500 bg-slate-50 p-2 rounded-xl border border-slate-100/50 font-medium">
                                    <strong>Phương án chính xác:</strong> ${q.o[q.ans]}
                                </div>
                            </div>
                        `;
                    });
                } else {
                    resultsHTML = `<p class="text-center text-xs text-slate-400 py-8 font-medium">Không tìm thấy câu hỏi nào phù hợp.</p>`;
                }
            } else {
                resultsHTML = `
                    <div class="text-center text-xs text-slate-400 py-12 space-y-2 animate-fadeIn">
                        <p class="font-bold text-slate-500">Bắt đầu nhập từ khóa cần tra cứu</p>
                        <p class="text-[10px] text-slate-400 max-w-xs mx-auto">Hệ thống phân tích cú pháp thời gian thực dựa trên 453 dữ liệu lý thuyết ôn tập.</p>
                    </div>
                `;
            }

            return `
                <div class="space-y-5 animate-fadeIn">
                    <div class="space-y-1">
                        <h2 class="text-base font-black text-slate-800">Tra cứu nhanh đáp án chính xác</h2>
                        <p class="text-xs text-slate-500 font-medium">Tìm kiếm dựa trên cơ sở dữ liệu 453 câu hỏi gốc hệ thống.</p>
                    </div>

                    <div class="relative">
                        <input id="search-input" type="text" oninput="triggerSearch(this.value)" placeholder="Nhập từ khoá (thặng dư, hàng hóa, tư bản...)" value="${state.searchQuery}" class="w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-2xl text-xs focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all shadow-xs" />
                        <span class="absolute left-3.5 top-3.5 text-slate-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                            </svg>
                        </span>
                    </div>

                    <div class="space-y-3">
                        ${resultsHTML}
                    </div>
                </div>
            `;
        };

        const triggerSearch = (query) => {
            state.searchQuery = query;
            renderView();
            // Refocus dynamic input element smoothly after state render
            const input = document.getElementById('search-input');
            if (input) {
                input.focus();
                input.selectionStart = input.selectionEnd = input.value.length;
            }
        };

        // STATS RENDERER
        const renderStats = () => {
            let statsListHTML = '';
            chapters.forEach(ch => {
                const progressVal = state.statsData[ch.id] || 0;
                const progressPercentage = Math.round((progressVal / ch.count) * 100);

                statsListHTML += `
                    <div class="space-y-2">
                        <div class="flex justify-between text-xs">
                            <span class="font-black text-slate-700">Chương ${ch.id}</span>
                            <span class="font-bold text-indigo-600">${progressVal}/${ch.count} câu (${progressPercentage}%)</span>
                        </div>
                        <div class="w-full bg-slate-100 h-3 rounded-full overflow-hidden">
                            <div class="bg-gradient-to-r from-indigo-500 to-indigo-600 h-3 rounded-full transition-all duration-300" style="width: ${progressPercentage}%"></div>
                        </div>
                    </div>
                `;
            });

            return `
                <div class="space-y-5 animate-fadeIn">
                    <div class="space-y-1">
                        <h2 class="text-base font-black text-slate-800">Biểu đồ tiến trình học tập</h2>
                        <p class="text-xs text-slate-500 font-medium">Tỉ lệ phần trăm tích lũy câu trả lời chính xác của từng chương.</p>
                    </div>

                    <div class="bg-white border border-slate-100 rounded-3xl p-5 shadow-sm space-y-5">
                        ${statsListHTML}
                    </div>

                    <button onclick="changeView('home')" class="w-full py-3.5 bg-slate-800 hover:bg-slate-900 border border-slate-200 text-white text-xs font-bold rounded-2xl active:scale-[0.98] transition">
                        Quay Lại Trang Chủ
                    </button>
                </div>
            `;
        };

        // WRONG ANSWERS REVIEW RENDERER
        const renderWrongReview = () => {
            let wrongsListHTML = '';
            state.wrongAnswers.forEach(q => {
                let optionsHTML = '';
                q.o.forEach((opt, idx) => {
                    const isCorrectOption = idx === q.ans;
                    optionsHTML += `
                        <div class="p-2.5 rounded-xl text-xs leading-tight border font-medium ${isCorrectOption ? 'bg-emerald-50 border-emerald-100 text-emerald-800 font-bold' : 'bg-white border-slate-100 text-slate-400'}">
                            ${["A", "B", "C", "D"][idx]}. ${opt}
                        </div>
                    `;
                });

                wrongsListHTML += `
                    <div class="bg-white border border-slate-100 rounded-2xl p-4 shadow-sm space-y-3 animate-fadeIn">
                        <div class="flex justify-between text-[9px] text-slate-400 font-extrabold uppercase">
                            <span>CHƯƠNG ${q.ch} • CÂU ${q.id}</span>
                            <span class="text-emerald-600">Đáp án đúng: ${["A", "B", "C", "D"][q.ans]}</span>
                        </div>
                        <h3 class="text-xs font-bold text-slate-800 leading-snug">${q.q}</h3>
                        <div class="space-y-1.5 pt-1">
                            ${optionsHTML}
                        </div>
                    </div>
                `;
            });

            return `
                <div class="space-y-5 animate-fadeIn">
                    <div class="flex justify-between items-center border-b border-slate-100 pb-3">
                        <div>
                            <h2 class="text-base font-black text-slate-800">Khắc phục các lỗi sai</h2>
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Danh sách tích luỹ câu đã chọn sai</p>
                        </div>
                        <button onclick="clearWrongAnswers()" class="text-xs text-rose-500 font-bold bg-rose-50 px-3 py-1 rounded-xl hover:bg-rose-100 transition">
                            Xoá lịch sử
                        </button>
                    </div>

                    <div class="space-y-4">
                        ${wrongsListHTML}
                    </div>
                </div>
            `;
        };

        const clearWrongAnswers = () => {
            synthSound('click');
            state.wrongAnswers = [];
            changeView('home');
        };

        // BOOKMARKS REVIEW RENDERER
        const renderBookmarkReview = () => {
            let bookmarksListHTML = '';
            state.bookmarks.forEach(q => {
                let optionsHTML = '';
                q.o.forEach((opt, idx) => {
                    const isCorrectOption = idx === q.ans;
                    optionsHTML += `
                        <div class="p-2.5 rounded-xl text-xs leading-tight border font-medium ${isCorrectOption ? 'bg-emerald-50 border-emerald-100 text-emerald-800 font-bold' : 'bg-white border-slate-100 text-slate-400'}">
                            ${["A", "B", "C", "D"][idx]}. ${opt}
                        </div>
                    `;
                });

                bookmarksListHTML += `
                    <div class="bg-white border border-slate-100 rounded-2xl p-4 shadow-sm space-y-3 animate-fadeIn">
                        <div class="flex justify-between text-[9px] text-slate-400 font-extrabold uppercase">
                            <span>CHƯƠNG ${q.ch} • CÂU ${q.id}</span>
                            <span class="text-indigo-600">Đáp án: ${["A", "B", "C", "D"][q.ans]}</span>
                        </div>
                        <h3 class="text-xs font-bold text-slate-800 leading-snug">${q.q}</h3>
                        <div class="space-y-1.5 pt-1">
                            ${optionsHTML}
                        </div>
                    </div>
                `;
            });

            return `
                <div class="space-y-5 animate-fadeIn">
                    <div class="flex justify-between items-center border-b border-slate-100 pb-3">
                        <div>
                            <h2 class="text-base font-black text-slate-800">Các câu trích yếu đã lưu</h2>
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Lưu trữ các câu trọng điểm</p>
                        </div>
                        <button onclick="clearBookmarks()" class="text-xs text-slate-400 font-bold bg-slate-100 px-3 py-1 rounded-xl hover:bg-slate-200 transition">
                            Bỏ lưu tất cả
                        </button>
                    </div>

                    <div class="space-y-4">
                        ${bookmarksListHTML}
                    </div>
                </div>
            `;
        };

        const clearBookmarks = () => {
            synthSound('click');
            state.bookmarks = [];
            changeView('home');
        };

        // GENERAL ROUTER ENGINE
        const renderView = () => {
            const router = document.getElementById('view-router');
            if (state.currentView === 'home') {
                router.innerHTML = renderHome();
            } else if (state.currentView === 'study') {
                router.innerHTML = renderStudy();
            } else if (state.currentView === 'flashcard') {
                router.innerHTML = renderFlashcard();
            } else if (state.currentView === 'exam') {
                router.innerHTML = renderExam();
            } else if (state.currentView === 'search') {
                router.innerHTML = renderSearch();
            } else if (state.currentView === 'stats') {
                router.innerHTML = renderStats();
            } else if (state.currentView === 'wrong-review') {
                router.innerHTML = renderWrongReview();
            } else if (state.currentView === 'bookmark-review') {
                router.innerHTML = renderBookmarkReview();
            }
        };

        // TIMER HELPER
        const formatTime = (seconds) => {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        };

        // ON-LOAD INITIALIZATION
        window.onload = function() {
            state.questions = generateFullQuestionBank();
            updateMascot('idle', 'Chào bạn! Hôm nay chúng ta cùng chinh phục lý thuyết Kinh tế Chính trị nhé!');
            renderView();
        };
    </script>
</body>
</html>
