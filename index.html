                            { q: "Hình thức cấu trúc bộ máy Nhà nước của Việt Nam là:", a: ["Nhà nước Liên bang.", "Nhà nước đơn nhất.", "Nhà nước Liên minh.", "Không có đáp án nào đúng."], c: 1, r: "Việt Nam là một nhà nước đơn nhất, có chủ quyền thống nhất và toàn vẹn lãnh thổ bất khả phân chia." },
                            { q: "Bộ luật dân sự hiện hành năm 2015 điều chỉnh những nội dung nào dưới đây?", a: ["Quy định địa vị pháp lý, chuẩn mực pháp lý về cách ứng xử của cá nhân, pháp nhân.", "Quy định địa vị pháp lý, chuẩn mực pháp lý về cách ứng xử của cá nhân, pháp nhân và chủ thể khác.", "Quy định quyền, nghĩa vụ về nhân thân và tài sản của cá nhân, pháp nhân trên cơ sở bình đẳng, tự do ý chí.", "Địa vị pháp lý và các quan hệ nhân thân, tài sản hình thành trên cơ sở bình đẳng, tự do ý chí, độc lập tài sản và tự chịu trách nhiệm."], c: 3, r: "Bộ luật Dân sự quy định địa vị pháp lý, chuẩn mực pháp lý về ứng xử và quyền nghĩa vụ nhân thân, tài sản của các chủ thể." },
                            { q: "Nền kinh tế thị trường ở Việt Nam hiện nay có bản chất:", a: ["Nền kinh tế thị trường có sự bảo hộ của nhà nước.", "Nền kinh tế thị trường định hướng xã hội chủ nghĩa.", "Nền kinh tế thị trường tự nhiên.", "Tất cả các đáp án trên."], c: 1, r: "Mô hình tổng quát của nước ta là nền kinh tế thị trường định hướng xã hội chủ nghĩa." },
                            { q: "Nhiệm kì của Quốc hội là bao nhiêu năm?", a: ["05 năm, tính từ kỳ họp thứ nhất khóa đó đến kỳ họp thứ nhất khóa sau.", "05 năm, tính từ kỳ bế mạc khóa trước đến bế mạc khóa sau.", "04 năm.", "06 năm."], c: 0, r: "Nhiệm kỳ của mỗi khóa Quốc hội là 5 năm, tính từ ngày khai mạc kỳ họp thứ nhất của khóa đó đến ngày khai mạc kỳ họp thứ nhất của khóa sau." },
                            { q: "Nguyên tắc làm việc của Quốc hội là:", a: ["Làm việc theo chế độ hội nghị và quyết định theo đa số.", "Làm việc theo chế độ hội nghị tự do.", "Làm việc theo chế độ hữu nghị.", "Làm việc bằng chế độ mệnh lệnh trực tiếp."], c: 0, r: "Quốc hội làm việc tập thể theo chế độ hội nghị và ra quyết định tối cao căn cứ theo nguyên tắc đa số biểu quyết." },
                            { q: "Quốc hội quyết định ban hành hoặc sửa đổi Hiến pháp khi có số lượng đại biểu biểu quyết tán thành tối thiểu là:", a: ["Ít nhất ba phần tư tổng số đại biểu Quốc hội.", "Ít nhất ba phần tư tổng số đại biểu có mặt.", "Ít nhất hai phần ba tổng số đại biểu Quốc hội.", "Ít nhất hai phần ba tổng số đại biểu có mặt."], c: 2, r: "Việc thông qua hoặc sửa đổi Hiến pháp bắt buộc phải được ít nhất hai phần ba (2/3) tổng số đại biểu Quốc hội tán thành." }
                        ]
                    }
                }
            }
        };

        let currentSubject = null;
        let currentChapter = null;
        let currentQuestionIndex = 0;
        let score = 0;
        let selectedOption = null;

        // CHUYỂN ĐỔI MÔN HỌC CHÍNH
        function switchSubject(subjectKey) {
            currentSubject = subjectKey;
            const subject = globalQuizDatabase[subjectKey];
            
            document.getElementById('subject-screen').classList.remove('active');
            document.getElementById('menu-screen').classList.add('active');
            
            // Cập nhật giao diện Header và Tiêu đề
            document.getElementById('app-title').innerText = subject.name;
            document.getElementById('menu-screen-title').innerText = `Danh sách học phần môn ${subject.name}:`;
            
            // Đổi màu header theo môn cho trực quan
            document.querySelector('header').style.backgroundColor = subject.color;

            renderChapters();
        }

        // QUAY LẠI MÀN HÌNH CHỌN MÔN
        function governors() {
            goToSubjects();
        }
        function goToSubjects() {
            document.getElementById('menu-screen').classList.remove('active');
            document.getElementById('quiz-screen').classList.remove('active');
            document.getElementById('subject-screen').classList.add('active');
            document.getElementById('app-title').innerText = "Hệ Thống Ôn Luyện Học Tập";
            document.querySelector('header').style.backgroundColor = "#2c3e50";
        }

        // RENDER DANH SÁCH CHƯƠNG CON
        function renderChapters() {
            const listContainer = document.getElementById('chapters-list');
            listContainer.innerHTML = '';
            
            const subjectData = globalQuizDatabase[currentSubject].data;
            
            for (let ch in subjectData) {
                const card = document.createElement('div');
                card.className = 'chapter-card';
                card.onclick = () => startQuiz(ch);
                card.innerHTML = `
                    <h3>${subjectData[ch].title}</h3>
                    <p>Tổng số: ${subjectData[ch].questions.length} câu trắc nghiệm xáo trộn chuẩn hóa</p>
                `;
                listContainer.appendChild(card);
            }
        }

        function startQuiz(chapterNum) {
            currentChapter = chapterNum;
            currentQuestionIndex = 0;
            score = 0;
            
            document.getElementById('menu-screen').classList.remove('active');
            document.getElementById('quiz-screen').classList.add('active');
            
            showQuestion();
        }

        function showQuestion() {
            selectedOption = null;
            document.getElementById('next-btn').style.display = 'none';
            
            const chapter = globalQuizDatabase[currentSubject].data[currentChapter];
            const totalQuestions = chapter.questions.length;
            const qData = chapter.questions[currentQuestionIndex];
            
            document.getElementById('question-numbering').innerText = `Câu ${currentQuestionIndex + 1}/${totalQuestions}`;
            document.getElementById('progress-fill').style.width = `${((currentQuestionIndex + 1) / totalQuestions) * 100}%`;
            
            const container = document.getElementById('quiz-container');
            
            let optionsHTML = '';
            qData.a.forEach((opt, idx) => {
                optionsHTML += `
                    <button class="option-btn" id="opt-${idx}" onclick="checkAnswer(${idx})">
                        <strong>${String.fromCharCode(65 + idx)}.</strong> ${opt}
                    </button>
                `;
            });

            container.innerHTML = `
                <div class="question-card">
                    <div class="question-text">${currentQuestionIndex + 1}. ${qData.q}</div>
                    <div class="options-container">${optionsHTML}</div>
                    <div class="rationale-box" id="rationale-box">${qData.r}</div>
                </div>
            `;
        }

        function checkAnswer(idx) {
            if (selectedOption !== null) return; 
            selectedOption = idx;
            
            const qData = globalQuizDatabase[currentSubject].data[currentChapter].questions[currentQuestionIndex];
            const correctIdx = qData.c;
            
            const selectedBtn = document.getElementById(`opt-${idx}`);
            const correctBtn = document.getElementById(`opt-${correctIdx}`);
            
            if (idx === correctIdx) {
                selectedBtn.classList.add('correct');
                score++;
            } else {
                selectedBtn.classList.add('wrong');
                correctBtn.classList.add('correct');
            }
            
            document.getElementById('rationale-box').style.display = 'block';
            document.getElementById('next-btn').style.display = 'block';
        }

        function nextQuestion() {
            const chapter = globalQuizDatabase[currentSubject].data[currentChapter];
            if (currentQuestionIndex < chapter.questions.length - 1) {
                currentQuestionIndex++;
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            const chapter = globalQuizDatabase[currentSubject].data[currentChapter];
            const container = document.getElementById('quiz-container');
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('question-numbering').innerText = "KẾT THÚC BÀI LÀM";
            
            let comment = "Hãy đọc kỹ lại giáo trình và luyện lại các câu sai để ghi nhớ tốt hơn!";
            if(score === chapter.questions.length) comment = "Xuất sắc tuyệt đối! Bạn đã trả lời đúng toàn bộ câu hỏi học phần.";
            else if(score >= (chapter.questions.length * 0.8)) comment = "Rất tốt! Kiến thức nền tảng của bạn cực kỳ chắc chắn.";

            container.innerHTML = `
                <div class="result-card">
                    <h2 style="color: var(--primary-color); font-size: 1.3rem;">Kết Quả Đạt Được</h2>
                    <div class="score-text">${score} / ${chapter.questions.length}</div>
                    <div class="result-comment">${comment}</div>
                    <button class="btn-next" onclick="backToChapters()">Quay lại danh sách chương</button>
                </div>
            `;
        }

        function backToChapters() {
            document.getElementById('quiz-screen').classList.remove('active');
            document.getElementById('menu-screen').classList.add('active');
            const subject = globalQuizDatabase[currentSubject];
            document.getElementById('app-title').innerText = subject.name;
            renderChapters();
        }
    </script>
</body>
</html>
